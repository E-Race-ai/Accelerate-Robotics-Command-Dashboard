# Render.com deployment blueprint.
# Apply via Render dashboard: New → Blueprint → point at this repo.
# Secret env vars (marked sync: false) must be set manually in the Render dashboard.
#
# Database: Turso (libsql remote). No persistent disk needed — Turso is managed externally.

services:
  - type: web
    name: accelerate-robotics
    runtime: node
    region: oregon
    plan: starter
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_AUTH_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN2_EMAIL
        sync: false
      - key: ADMIN2_PASSWORD
        sync: false
      - key: BOOTSTRAP_ADMIN_EMAILS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
