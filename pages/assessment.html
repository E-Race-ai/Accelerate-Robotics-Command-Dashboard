// ── Photo Capture ──
let pendingPhotoZoneIdx = null;
let pendingPhotoChecklistItem = null;

function capturePhoto(zoneIdx, checklistItem) {
  pendingPhotoZoneIdx = zoneIdx;
  pendingPhotoChecklistItem = checklistItem;
  document.getElementById('photoInput').click();
}

async function handlePhotoSelected(e) {
  const file = e.target.files[0];
  if (!file) return;

  const zoneIdx = pendingPhotoZoneIdx;
  const checklistItem = pendingPhotoChecklistItem;

  // Reset input so the same file can be re-selected
  e.target.value = '';

  try {
    const blob = file;
    const thumbnail = await generateThumbnail(blob);
    const photoId = generateUUID();

    // Save to IndexedDB
    const photoRecord = {
      id: photoId,
      assessmentId: state.id,
      zoneId: state.zones[zoneIdx]?.id || null,
      blob: blob,
      thumbnail: thumbnail,
      annotations: [],
      caption: checklistItem || '',
      checklistItem: checklistItem,
      takenAt: new Date().toISOString()
    };

    await savePhotoToDB(photoRecord);

    // Add reference to zone
    if (state.zones[zoneIdx]) {
      if (!state.zones[zoneIdx].photos) state.zones[zoneIdx].photos = [];
      state.zones[zoneIdx].photos.push({
        id: photoId,
        checklistItem: checklistItem
      });
    }

    markDirty();
    renderActiveTab();
    renderTabBar();
    // Render the photo grid for this zone after tab renders
    setTimeout(() => renderPhotoGridAsync(zoneIdx), 50);

    showToast('Photo captured', 'success');
  } catch (err) {
    console.error('Photo capture error:', err);
    showToast('Failed to save photo', 'error');
  }
}

function generateThumbnail(blob) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(blob);
    img.onload = () => {
      // WHY: 200px wide thumbnails balance file size against legibility in grid
      const targetWidth = 200;
      const scale = targetWidth / img.width;
      const targetHeight = img.height * scale;

      const canvas = document.createElement('canvas');
      canvas.width = targetWidth;
      canvas.height = targetHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, targetWidth, targetHeight);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
      URL.revokeObjectURL(url);
      resolve(dataUrl);
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error('Failed to load image for thumbnail'));
    };
    img.src = url;
  });
}

// ── IndexedDB for Photos ──
function openPhotoDb() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open('accelerate_assessments', 1);
    request.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('photos')) {
        db.createObjectStore('photos', { keyPath: 'id' });
      }
    };
    request.onsuccess = (e) => {
      photoDB = e.target.result;
      resolve();
    };
    request.onerror = (e) => {
      console.error('IndexedDB error:', e.target.error);
      reject(e.target.error);
    };
  });
}

function savePhotoToDB(record) {
  return new Promise((resolve, reject) => {
    if (!photoDB) { reject(new Error('Photo DB not open')); return; }
    const tx = photoDB.transaction('photos', 'readwrite');
    const store = tx.objectStore('photos');
    store.put(record);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

function getPhotoFromDB(id) {
  return new Promise((resolve, reject) => {
    if (!photoDB) { reject(new Error('Photo DB not open')); return; }
    const tx = photoDB.transaction('photos', 'readonly');
    const store = tx.objectStore('photos');
    const req = store.get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function deletePhotoFromDB(id) {
  return new Promise((resolve, reject) => {
    if (!photoDB) { resolve(); return; }
    const tx = photoDB.transaction('photos', 'readwrite');
    const store = tx.objectStore('photos');
    store.delete(id);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

function getAllPhotosForAssessment(assessmentId) {
  return new Promise((resolve, reject) => {
    if (!photoDB) { resolve([]); return; }
    const tx = photoDB.transaction('photos', 'readonly');
    const store = tx.objectStore('photos');
    const req = store.getAll();
    req.onsuccess = () => {
      const all = req.result.filter(p => p.assessmentId === assessmentId);
      resolve(all);
    };
    req.onerror = () => reject(req.error);
  });
}

// ── Render Photo Grid ──
async function renderPhotoGridAsync(zoneIdx) {
  const gridEl = document.getElementById('photoGrid_' + zoneIdx);
  if (!gridEl) return;

  const z = state.zones[zoneIdx];
  if (!z || !z.photos || z.photos.length === 0) {
    gridEl.innerHTML = '<div style="color:var(--text-dim); font-size:0.78rem; padding:8px 0;">No photos yet</div>';
    return;
  }

  let html = '';
  for (const photoRef of z.photos) {
    try {
      const photo = await getPhotoFromDB(photoRef.id);
      if (!photo) continue;
      const hasAnnotations = photo.annotations && photo.annotations.length > 0;
      // WHY: Validate thumbnail is a data URL to prevent XSS via malicious src values
      const safeSrc = (photo.thumbnail && photo.thumbnail.startsWith('data:image/')) ? photo.thumbnail : '';
      html += `<div class="photo-thumb" onclick="openAnnotation('${esc(photoRef.id)}')" oncontextmenu="event.preventDefault(); showPhotoMenu('${esc(photoRef.id)}', ${zoneIdx})">
        <img src="${safeSrc}" alt="${esc(photo.caption || 'Photo')}">
        ${hasAnnotations ? '<span class="photo-thumb-annotation-dot"></span>' : ''}
        <span class="photo-thumb-label">${esc(photo.caption || photo.checklistItem || 'Photo')}</span>
      </div>`;
    } catch (err) {
      console.error('Failed to load photo thumbnail:', err);
    }
  }

  gridEl.innerHTML = html || '<div style="color:var(--text-dim); font-size:0.78rem; padding:8px 0;">No photos yet</div>';
}

function showPhotoMenu(photoId, zoneIdx) {
  const action = prompt('Type "delete" to remove this photo, or enter a new caption:');
  if (action === null) return;
  if (action.toLowerCase() === 'delete') {
    deletePhoto(photoId, zoneIdx);
  } else if (action.trim()) {
    editPhotoCaption(photoId, action.trim());
  }
}

async function deletePhoto(photoId, zoneIdx) {
  await deletePhotoFromDB(photoId);
  const z = state.zones[zoneIdx];
  if (z) {
    z.photos = (z.photos || []).filter(p => p.id !== photoId);
  }
  markDirty();
  renderActiveTab();
  renderTabBar();
  setTimeout(() => renderPhotoGridAsync(zoneIdx), 50);
  showToast('Photo deleted', 'info');
}

async function editPhotoCaption(photoId, newCaption) {
  try {
    const photo = await getPhotoFromDB(photoId);
    if (photo) {
      photo.caption = newCaption;
      await savePhotoToDB(photo);
      // Re-render the current zone
      if (activeTab.startsWith('zone_')) {
        const idx = parseInt(activeTab.split('_')[1]);
        renderPhotoGridAsync(idx);
      }
    }
  } catch (err) {
    console.error('Failed to edit caption:', err);
  }
}

// ── Photo Annotation ──
async function openAnnotation(photoId) {
  try {
    const photo = await getPhotoFromDB(photoId);
    if (!photo) { showToast('Photo not found', 'error'); return; }

    currentAnnotationPhotoId = photoId;
    currentAnnotations = photo.annotations ? [...photo.annotations] : [];
    currentAnnotationTool = 'pin';
    arrowStartPoint = null;

    // Set image
    const imgEl = document.getElementById('annotationImg');
    if (photo.blob instanceof Blob) {
      imgEl.src = URL.createObjectURL(photo.blob);
    } else {
      imgEl.src = photo.thumbnail;
    }
    document.getElementById('annotationTitle').textContent = photo.caption || 'Annotate Photo';

    // Render existing annotations
    renderAnnotationSvg();

    // Show overlay
    document.getElementById('annotationOverlay').classList.add('open');

    // Reset tool buttons
    document.querySelectorAll('.anno-tool').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tool === 'pin');
    });
  } catch (err) {
    console.error('Failed to open annotation:', err);
    showToast('Failed to open photo', 'error');
  }
}

function selectAnnotationTool(tool) {
  currentAnnotationTool = tool;
  arrowStartPoint = null;
  document.querySelectorAll('.anno-tool').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tool === tool);
  });
}

function handleAnnotationClick(e) {
  const wrap = document.getElementById('annotationCanvasWrap');
  const rect = wrap.getBoundingClientRect();

  // Normalize coordinates to percentage (0-100) for resolution independence
  const x = ((e.clientX - rect.left) / rect.width) * 100;
  const y = ((e.clientY - rect.top) / rect.height) * 100;

  if (currentAnnotationTool === 'pin') {
    const label = prompt('Pin label:') || '';
    currentAnnotations.push({ type: 'pin', x, y, label, color: '#ef4444' });
    renderAnnotationSvg();
  } else if (currentAnnotationTool === 'arrow') {
    if (!arrowStartPoint) {
      arrowStartPoint = { x, y };
      showToast('Tap arrow endpoint', 'info');
    } else {
      currentAnnotations.push({
        type: 'arrow',
        x: arrowStartPoint.x, y: arrowStartPoint.y,
        x2: x, y2: y,
        color: '#f59e0b'
      });
      arrowStartPoint = null;
      renderAnnotationSvg();
    }
  } else if (currentAnnotationTool === 'text') {
    const text = prompt('Text label:');
    if (text) {
      currentAnnotations.push({ type: 'text', x, y, label: text, color: '#ffffff' });
      renderAnnotationSvg();
    }
  }
}

function renderAnnotationSvg() {
  const svg = document.getElementById('annotationSvg');
  let html = '<defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/></marker></defs>';

  currentAnnotations.forEach((a, i) => {
    if (a.type === 'pin') {
      html += `<circle class="anno-el" cx="${a.x}%" cy="${a.y}%" r="8" fill="${a.color || '#ef4444'}" stroke="#fff" stroke-width="2" onclick="event.stopPropagation(); removeAnnotation(${i})"/>`;
      if (a.label) {
        html += `<text class="anno-el" x="${a.x}%" y="${a.y - 2}%" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" style="text-shadow:0 1px 3px #000" onclick="event.stopPropagation(); removeAnnotation(${i})">${esc(a.label)}</text>`;
      }
    } else if (a.type === 'arrow') {
      html += `<line class="anno-el" x1="${a.x}%" y1="${a.y}%" x2="${a.x2}%" y2="${a.y2}%" stroke="${a.color || '#f59e0b'}" stroke-width="3" marker-end="url(#arrowhead)" onclick="event.stopPropagation(); removeAnnotation(${i})"/>`;
    } else if (a.type === 'text') {
      html += `<text class="anno-el" x="${a.x}%" y="${a.y}%" fill="${a.color || '#ffffff'}" font-size="14" font-weight="bold" style="text-shadow:0 1px 4px #000" onclick="event.stopPropagation(); removeAnnotation(${i})">${esc(a.label)}</text>`;
    }
  });

  svg.innerHTML = html;
}

function removeAnnotation(idx) {
  if (confirm('Remove this annotation?')) {
    currentAnnotations.splice(idx, 1);
    renderAnnotationSvg();
  }
}

async function closeAnnotation() {
  // Save annotations to the photo record in IndexedDB
  if (currentAnnotationPhotoId) {
    try {
      const photo = await getPhotoFromDB(currentAnnotationPhotoId);
      if (photo) {
        photo.annotations = currentAnnotations;
        await savePhotoToDB(photo);
      }
    } catch (err) {
      console.error('Failed to save annotations:', err);
    }
  }

  // Clean up blob URL
  const imgEl = document.getElementById('annotationImg');
  if (imgEl.src.startsWith('blob:')) {
    URL.revokeObjectURL(imgEl.src);
  }

  document.getElementById('annotationOverlay').classList.remove('open');
  currentAnnotationPhotoId = null;
  currentAnnotations = [];
  arrowStartPoint = null;

  // Re-render photo grid if on a zone tab
  if (activeTab.startsWith('zone_')) {
    const idx = parseInt(activeTab.split('_')[1]);
    renderPhotoGridAsync(idx);
  }
}

// ── Auto-Save (localStorage) ──
function markDirty() {
  dirty = true;
  state.updated_at = new Date().toISOString();
  updateOverallStatus();
}

function startAutoSave() {
  // WHY: 30-second interval balances data safety against localStorage write overhead
  autoSaveTimer = setInterval(autoSave, 30000);
}

function autoSave() {
  if (!state.id) return;
  collectActiveInputs();
  try {
    const key = 'assessment_draft_' + state.id;
    localStorage.setItem(key, JSON.stringify(state));
    lastSaveTime = new Date();
    dirty = false;
    updateSaveIndicator();
  } catch (err) {
    console.error('Auto-save failed:', err);
    showToast('Auto-save failed — localStorage may be full', 'error');
  }
}

function loadFromLocal(id) {
  try {
    const key = 'assessment_draft_' + id;
    const data = localStorage.getItem(key);
    return data ? JSON.parse(data) : null;
  } catch (err) {
    console.error('Failed to load from localStorage:', err);
    return null;
  }
}

function updateSaveIndicator() {
  const el = document.getElementById('saveIndicator');
  if (lastSaveTime) {
    const ago = Math.round((Date.now() - lastSaveTime.getTime()) / 1000);
    if (ago < 5) {
      el.textContent = 'Saved just now';
    } else if (ago < 60) {
      el.textContent = 'Saved ' + ago + 's ago';
    } else {
      el.textContent = 'Saved ' + Math.round(ago / 60) + 'm ago';
    }
  } else {
    el.textContent = dirty ? 'Unsaved changes' : 'Not saved';
  }
}

// Update save indicator every 10 seconds
setInterval(updateSaveIndicator, 10000);

// ── Server Load ──
async function loadFromServer(id) {
  try {
    const resp = await fetch('/api/assessments/' + encodeURIComponent(id), {
      credentials: 'include'
    });
    // WHY: Redirect to login on 401 — token may have expired during site walk
    if (resp.status === 401) { window.location.href = '/admin-login.html'; return null; }
    if (!resp.ok) return null;
    const data = await resp.json();
    if (!data || !data.id) return null;

    // Parse JSON fields
    if (typeof data.operations_data === 'string') {
      try { data.operations_data = JSON.parse(data.operations_data); } catch(e) { data.operations_data = { shifts: [], contracted_services: [], fb_venues: [], event_spaces: [], automation_notes: '', pain_points: '' }; }
    }
    if (typeof data.infrastructure_data === 'string') {
      try { data.infrastructure_data = JSON.parse(data.infrastructure_data); } catch(e) { data.infrastructure_data = { wifi: {}, elevators: [], power_notes: '', storage_notes: '', network_notes: '' }; }
    }

    // Ensure nested objects exist
    if (!data.operations_data) data.operations_data = { shifts: [], contracted_services: [], fb_venues: [], event_spaces: [], automation_notes: '', pain_points: '' };
    if (!data.operations_data.fb_venues) data.operations_data.fb_venues = [];
    if (!data.operations_data.event_spaces) data.operations_data.event_spaces = [];
    if (!data.infrastructure_data) data.infrastructure_data = { wifi: {}, elevators: [], power_notes: '', storage_notes: '', network_notes: '' };
    if (!data.infrastructure_data.wifi) data.infrastructure_data.wifi = {};
    if (!data.zones) data.zones = [];
    if (!data.stakeholders) data.stakeholders = [];

    // Parse zone floor_surfaces from JSON strings
    data.zones.forEach(z => {
      if (typeof z.floor_surfaces === 'string') {
        try { z.floor_surfaces = JSON.parse(z.floor_surfaces); } catch(e) { z.floor_surfaces = []; }
      }
      if (!z.photos) z.photos = [];
    });

    return data;
  } catch (err) {
    console.error('Server load failed:', err);
    return null;
  }
}

// ── Sync to Server ──
async function syncToServer() {
  if (!navigator.onLine) {
    showToast('You\'re offline — connect to sync', 'error');
    return;
  }

  if (!state.property_name) {
    showToast('Enter a property name before syncing', 'error');
    return;
  }
  if (!state.assigned_to) {
    showToast('Assign a rep before syncing', 'error');
    return;
  }

  // Save locally first
  autoSave();

  updateSyncStatus('syncing');

  try {
    // WHY: Send state as-is — server handles JSON.stringify on object/array fields.
    // Pre-stringifying here would cause double-stringify because express.json()
    // parses the outer JSON, leaving inner strings for the server to stringify again.
    const payload = { ...state };

    // Remove photo references from zone payload (photos upload separately)
    payload.zones = state.zones.map(z => ({
      ...z,
      photos: undefined
    }));

    const resp = await fetch('/api/assessments', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify(payload)
    });

    if (resp.status === 401) { window.location.href = '/admin-login.html'; return; }
    if (!resp.ok) {
      const err = await resp.text();
      throw new Error('Server returned ' + resp.status + ': ' + err);
    }

    // Upload photos in batches of 5
    const allPhotos = await getAllPhotosForAssessment(state.id);
    const batchSize = 5; // WHY: batches of 5 balance upload speed against timeout risk on slow hotel WiFi
    for (let i = 0; i < allPhotos.length; i += batchSize) {
      const batch = allPhotos.slice(i, i + batchSize);
      await uploadPhotoBatch(state.id, batch);
    }

    state.synced_at = new Date().toISOString();
    autoSave();
    updateSyncStatus('synced');
    showToast('Synced successfully', 'success');
  } catch (err) {
    console.error('Sync failed:', err);
    updateSyncStatus('failed');
    showToast('Sync failed: ' + err.message, 'error');
  }
}

async function uploadPhotoBatch(assessmentId, photos) {
  // WHY: Server expects multer field name 'photos' (plural) and a parallel JSON array
  // in the 'metadata' field. Batch up to 5 per request to balance speed vs timeout risk.
  try {
    const formData = new FormData();
    const metadataArr = [];

    for (const photo of photos) {
      formData.append('photos', photo.blob, 'photo.jpg');
      metadataArr.push({
        id: photo.id,
        zone_id: photo.zoneId,
        checklist_item: photo.checklistItem,
        caption: photo.caption,
        annotations: photo.annotations,
        taken_at: photo.takenAt
      });
    }

    formData.append('metadata', JSON.stringify(metadataArr));

    const resp = await fetch('/api/assessments/' + encodeURIComponent(assessmentId) + '/photos', {
      method: 'POST',
      credentials: 'include',
      body: formData
    });

    if (!resp.ok) {
      const err = await resp.text();
      console.error('Photo batch upload failed:', resp.status, err);
    }
  } catch (err) {
    console.error('Photo batch upload failed:', err);
  }
}

function updateSyncStatus(status, message) {
  const btn = document.getElementById('syncBtn');
  const label = document.getElementById('syncLabel');

  btn.className = 'sync-btn';

  switch (status) {
    case 'ready':
      btn.classList.add('sync-ready');
      label.textContent = 'Sync';
      break;
    case 'offline':
      btn.classList.add('sync-offline');
      label.textContent = 'Offline';
      break;
    case 'syncing':
      btn.classList.add('sync-syncing');
      label.textContent = 'Syncing...';
      break;
    case 'synced':
      btn.classList.add('sync-synced');
      label.textContent = 'Synced';
      // WHY: revert to "ready" after 5s so the button remains actionable
      setTimeout(() => {
        if (navigator.onLine) updateSyncStatus('ready');
      }, 5000);
      break;
    case 'failed':
      btn.classList.add('sync-failed');
      label.textContent = 'Failed';
      setTimeout(() => {
        if (navigator.onLine) updateSyncStatus('ready');
      }, 5000);
      break;
  }
}

// ── Completion Tracking ──
function getTabCompletion(tabId) {
  if (tabId === 'overview') {
    const hasName = !!state.property_name;
    const hasRooms = state.rooms != null && state.rooms > 0;
    const hasFloors = state.floors != null && state.floors > 0;
    const hasElevators = state.elevators != null && state.elevators >= 0;
    const hasContact = !!(state.gm_name || state.engineering_contact);
    const complete = hasName && hasRooms && hasFloors && hasElevators && hasContact;
    const partial = hasName || hasRooms || hasFloors || hasContact;
    return complete ? 'complete' : partial ? 'partial' : 'empty';
  }

  if (tabId === 'stakeholders') {
    const withNameAndRole = state.stakeholders.filter(s => s.name && s.role);
    if (withNameAndRole.length > 0) return 'complete';
    if (state.stakeholders.length > 0) return 'partial';
    return 'empty';
  }

  if (tabId === 'operations') {
    const hasShift = state.operations_data.shifts.length > 0;
    const hasService = state.operations_data.contracted_services.length > 0;
    if (hasShift || hasService) return 'complete';
    if (state.operations_data.automation_notes || state.operations_data.pain_points) return 'partial';
    return 'empty';
  }

  if (tabId === 'infrastructure') {
    const hasWifi = !!state.infrastructure_data.wifi.coverage;
    const hasElevator = state.infrastructure_data.elevators.length > 0;
    if (hasWifi || hasElevator) return 'complete';
    if (state.infrastructure_data.power_notes || state.infrastructure_data.storage_notes || state.infrastructure_data.network_notes) return 'partial';
    return 'empty';
  }

  return 'empty';
}

function getZoneCompletion(zoneIdx) {
  const z = state.zones[zoneIdx];
  if (!z) return 'empty';

  const hasSurfaces = z.floor_surfaces && z.floor_surfaces.length > 0;
  const hasWidth = z.corridor_width_ft != null;
  const hasReadiness = !!z.robot_readiness;
  const photoCount = (z.photos || []).length;

  const complete = hasSurfaces && hasWidth && hasReadiness && photoCount >= 2;
  const partial = hasSurfaces || hasWidth || hasReadiness || photoCount > 0
    || z.current_cleaning_method || z.pain_points || z.notes;

  return complete ? 'complete' : partial ? 'partial' : 'empty';
}

function updateOverallStatus() {
  const overviewComplete = getTabCompletion('overview') === 'complete';
  const allPropertyComplete = PROPERTY_TABS.every(t => getTabCompletion(t) === 'complete');
  const completeZones = state.zones.filter((_, i) => getZoneCompletion(i) === 'complete').length;

  let newStatus = state.status;
  if (allPropertyComplete && completeZones >= 2) {
    newStatus = 'completed';
  } else if (overviewComplete) {
    newStatus = 'in_progress';
  } else {
    newStatus = 'draft';
  }

  // WHY: Only auto-advance status, never auto-regress (user might manually override)
  const statusOrder = { draft: 0, in_progress: 1, completed: 2, synced: 3 };
  if (statusOrder[newStatus] > statusOrder[state.status]) {
    state.status = newStatus;
  }

  updateStatusBadge();
}

function updateStatusBadge() {
  const badge = document.getElementById('statusBadge');
  badge.className = 'status-badge status-' + state.status;
  const labels = { draft: 'DRAFT', in_progress: 'IN PROGRESS', completed: 'COMPLETED', synced: 'SYNCED' };
  badge.textContent = labels[state.status] || state.status.toUpperCase();
}

// ── Toast Notifications ──
function showToast(message, type) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast ' + (type || 'info');
  toast.textContent = message;
  container.appendChild(toast);

  // WHY: 3-second display with 300ms fade — long enough to read, short enough not to annoy
  setTimeout(() => {
    toast.classList.add('fadeout');
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}
