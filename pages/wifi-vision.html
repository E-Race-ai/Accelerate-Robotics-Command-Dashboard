<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WiFi Vision Extreme · Accelerate Robotics</title>
<style>
  /* WHY: The embedded A/V Cast / WiFi Audit views (port 8765) already provide
     their own command bar with tabs and a theme switch. Wrapping them in
     another header here just adds a duplicate row, so the page is intentionally
     a bare iframe — A/V Cast is the default landing view, and switching to
     WiFi Audit happens via the embedded page's own tab pill. */
  html, body { margin: 0; padding: 0; height: 100%; background: #f4f6fb; }
  iframe {
    display: block;
    width: 100%; height: 100%;
    border: 0;
    background: #f4f6fb;
  }
</style>
</head>
<body>
<iframe id="wifi-vision-frame" title="WiFi Vision Extreme"
        src="http://127.0.0.1:8765/" loading="eager"></iframe>
</body>
</html>
