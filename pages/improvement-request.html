<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Improvement Requests — Accelerate Robotics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/brand.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Inter',system-ui,sans-serif; color:var(--text); min-height:100vh;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(16,185,129,0.10), transparent),
      radial-gradient(ellipse 60% 40% at 80% 30%, rgba(59,130,246,0.08), transparent),
      linear-gradient(180deg, #f5f6fb 0%, #f7f8fc 100%);
    background-attachment:fixed;
    line-height:1.5;
  }
  h1, h2, h3 { font-family:'Space Grotesk', 'Inter', sans-serif; letter-spacing:-0.01em; }
  .mono { font-family:'JetBrains Mono', Menlo, monospace; }

  .page { max-width:1280px; margin:0 auto; padding:32px 24px 96px; }

  .topbar { display:flex; align-items:center; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
  .back-link {
    display:inline-flex; align-items:center; gap:6px; font-size:0.82rem;
    color:var(--text-dim); text-decoration:none;
  }
  .back-link:hover { color:var(--blue); }

  .eyebrow {
    font-family:'JetBrains Mono', monospace; font-size:0.7rem; font-weight:700;
    color:#10b981; text-transform:uppercase; letter-spacing:2px; margin-bottom:10px;
  }
  h1 { font-size:2rem; font-weight:800; line-height:1.1; margin-bottom:8px; }
  h1 .accent {
    background:linear-gradient(135deg, #10b981, #3b82f6);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .lede { font-size:0.95rem; color:var(--text-dim); max-width:720px; margin-bottom:24px; }

  .field { display:flex; flex-direction:column; gap:5px; margin-bottom:14px; }
  .field label { font-size:0.78rem; font-weight:700; color:#0f172a; }

  .toolbar {
    display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:16px;
  }
  .tab {
    background:white; border:1px solid var(--border);
    padding:6px 13px; border-radius:999px;
    font-size:12px; font-weight:600; color:#475569; cursor:pointer;
    transition:all 0.15s;
  }
  .tab:hover { background:#f8fafc; border-color:#cbd5e1; }
  .tab.active { background:#0c1220; color:white; border-color:#0c1220; }
  .tab .count {
    margin-left:5px; padding:1px 6px; border-radius:999px;
    background:rgba(255,255,255,0.18); font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
  }
  .tab:not(.active) .count { background:#eef2f7; color:#64748b; }

  .board {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
    gap:12px;
  }

  .req-card {
    background:white; border:1px solid var(--border); border-radius:14px;
    padding:16px; display:flex; flex-direction:column; gap:8px;
    box-shadow:0 1px 3px rgba(15,23,42,0.04);
    transition:transform 0.12s, box-shadow 0.15s;
  }
  .req-card:hover { transform:translateY(-2px); box-shadow:0 8px 22px rgba(15,23,42,0.08); }

  .req-head { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
  .req-num {
    font-family:'JetBrains Mono', monospace; font-size:11px; font-weight:700;
    color:#10b981; background:#ecfdf5; padding:2px 8px; border-radius:999px;
  }
  .pill {
    font-size:10px; font-weight:700; padding:3px 8px;
    border-radius:999px; text-transform:uppercase; letter-spacing:0.5px;
    white-space:nowrap;
  }
  .pill.cat-ui             { background:#eef2ff; color:#4f46e5; }
  .pill.cat-workflow       { background:#fef3c7; color:#92400e; }
  .pill.cat-performance    { background:#fce7f3; color:#be185d; }
  .pill.cat-integration    { background:#ecfeff; color:#0e7490; }
  .pill.cat-documentation  { background:#f1f5f9; color:#475569; }
  .pill.cat-other          { background:#f1f5f9; color:#475569; }
  .pill.prio-low           { background:#f1f5f9; color:#475569; }
  .pill.prio-medium        { background:#fffbeb; color:#92400e; }
  .pill.prio-high          { background:#fff1f2; color:#be123c; }
  .pill.prio-critical      { background:#fee2e2; color:#991b1b; box-shadow:0 0 0 1px #fca5a5; }
  .pill.status-new         { background:#fef3c7; color:#92400e; }
  .pill.status-under_review{ background:#dbeafe; color:#1e40af; }
  .pill.status-planned     { background:#e0e7ff; color:#3730a3; }
  .pill.status-in_progress { background:#fce7f3; color:#be185d; }
  .pill.status-completed   { background:#dcfce7; color:#166534; }
  .pill.status-declined    { background:#f1f5f9; color:#475569; }

  .req-card h3 { font-size:0.95rem; line-height:1.25; color:#0f172a; }
  .req-card .desc {
    font-size:0.83rem; color:#475569; line-height:1.45;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .req-meta {
    font-size:0.73rem; color:#94a3b8; margin-top:4px;
    display:flex; flex-wrap:wrap; gap:8px;
  }

  .req-card { cursor:pointer; }

  .empty {
    grid-column:1/-1; padding:40px;
    text-align:center; color:#94a3b8;
    border:2px dashed #e5e7eb; border-radius:14px;
    background:rgba(255,255,255,0.5);
  }

  /* Detail modal */
  .modal-bg {
    position:fixed; inset:0; background:rgba(15,23,42,0.5);
    display:none; align-items:center; justify-content:center;
    z-index:50; padding:20px;
  }
  .modal-bg.show { display:flex; }
  .modal {
    background:white; border-radius:16px;
    width:100%; max-width:620px; max-height:90vh;
    overflow-y:auto; padding:28px;
    box-shadow:0 20px 50px rgba(15,23,42,0.25);
  }
  .modal-close {
    float:right; background:none; border:none; cursor:pointer;
    font-size:20px; color:#94a3b8; padding:4px 8px; border-radius:6px;
  }
  .modal-close:hover { background:#f1f5f9; color:#0f172a; }
  .detail-id {
    font-family:'JetBrains Mono', monospace; font-size:0.85rem; font-weight:700;
    color:#10b981; background:#ecfdf5; padding:4px 12px; border-radius:999px;
    display:inline-block; margin-bottom:12px;
  }
  .detail-title { font-size:1.3rem; font-weight:800; line-height:1.25; margin-bottom:12px; }
  .detail-pills { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
  .detail-section { margin-bottom:16px; }
  .detail-section label {
    display:block; font-size:0.72rem; font-weight:700; color:#94a3b8;
    text-transform:uppercase; letter-spacing:0.8px; margin-bottom:4px;
  }
  .detail-section p {
    font-size:0.92rem; color:#0f172a; line-height:1.6;
    white-space:pre-wrap; word-break:break-word;
  }
  .detail-meta {
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
    padding-top:16px; border-top:1px solid var(--border);
  }
  .detail-meta .item label {
    display:block; font-size:0.7rem; font-weight:700; color:#94a3b8;
    text-transform:uppercase; letter-spacing:0.6px; margin-bottom:2px;
  }
  .detail-meta .item span { font-size:0.88rem; color:#0f172a; font-weight:500; }
</style>
</head>
<body>
<div class="page">

  <div class="topbar">
    <a href="/admin" class="back-link">&larr; Command Center</a>
  </div>

  <!-- Cross-nav between feedback tools -->
  <div style="display:flex; gap:8px; margin-bottom:18px;">
    <a href="/pages/feedback.html" style="flex:1; display:flex; align-items:center; gap:10px; padding:12px 16px; border-radius:12px; background:white; border:1.5px solid var(--border); text-decoration:none; color:#475569; font-weight:600; font-size:0.88rem; transition:all 0.15s;" onmouseover="this.style.borderColor='#dc2626';this.style.color='#dc2626'" onmouseout="this.style.borderColor='';this.style.color='#475569'">
      <span style="width:32px; height:32px; border-radius:8px; background:#fef2f2; display:flex; align-items:center; justify-content:center;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="6" width="8" height="14" rx="4"/><path d="M12 6V3M9 6L7 4M15 6l2-2M5 11H2M22 11h-3M5 16H2M22 16h-3"/></svg>
      </span>
      Bug / Feature
    </a>
    <a href="/pages/improvement-request.html" style="flex:1; display:flex; align-items:center; gap:10px; padding:12px 16px; border-radius:12px; background:#ecfdf5; border:2px solid #10b981; text-decoration:none; color:#0f172a; font-weight:700; font-size:0.88rem; transition:all 0.15s;">
      <span style="width:32px; height:32px; border-radius:8px; background:#d1fae5; display:flex; align-items:center; justify-content:center;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
      </span>
      Improvement Request
    </a>
  </div>

  <div class="eyebrow">Toolkit &middot; Improvement Requests</div>
  <h1><span class="accent">Improvement</span> Requests</h1>
  <p class="lede">Submit an idea to improve the platform. Every request gets a tracking number so the whole team can follow its progress.</p>

  <div>
    <!-- Tracking board -->
    <div>
      <div class="toolbar">
        <button class="tab active" data-status="all">All</button>
        <button class="tab" data-status="new">New <span class="count" id="count-new">0</span></button>
        <button class="tab" data-status="under_review">Under Review <span class="count" id="count-under_review">0</span></button>
        <button class="tab" data-status="planned">Planned <span class="count" id="count-planned">0</span></button>
        <button class="tab" data-status="in_progress">In Progress <span class="count" id="count-in_progress">0</span></button>
        <button class="tab" data-status="completed">Completed <span class="count" id="count-completed">0</span></button>
      </div>
      <div class="board" id="board"></div>
    </div>

  </div>
</div>

<!-- Detail Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <button class="modal-close" id="modalClose">&times;</button>
    <div id="detailContent"></div>
  </div>
</div>

<script>
  const $ = (s) => document.querySelector(s);
  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function timeAgo(iso) {
    if (!iso) return '';
    const ms = Date.now() - new Date(iso + 'Z').getTime();
    const sec = Math.floor(ms / 1000);
    if (sec < 60) return 'just now';
    if (sec < 3600) return `${Math.floor(sec/60)}m ago`;
    if (sec < 86400) return `${Math.floor(sec/3600)}h ago`;
    return `${Math.floor(sec/86400)}d ago`;
  }

  let allRequests = [];
  let activeStatus = 'all';

  // ── Load requests ─────────────────────────────────────────────
  async function loadRequests() {
    try {
      const r = await fetch('/api/improvement-requests');
      if (!r.ok) throw new Error('fetch failed');
      allRequests = await r.json();
      renderTabs();
      renderBoard();
    } catch (e) {
      $('#board').innerHTML = `<div class="empty">Could not load requests: ${escapeHtml(e.message)}</div>`;
    }
  }

  function renderTabs() {
    const counts = { new:0, under_review:0, planned:0, in_progress:0, completed:0, declined:0 };
    allRequests.forEach(r => { if (counts[r.status] !== undefined) counts[r.status]++; });
    Object.entries(counts).forEach(([k, v]) => {
      const el = document.getElementById(`count-${k}`);
      if (el) el.textContent = v;
    });
  }

  function renderBoard() {
    const filtered = activeStatus === 'all'
      ? allRequests
      : allRequests.filter(r => r.status === activeStatus);

    if (filtered.length === 0) {
      $('#board').innerHTML = `<div class="empty">No ${activeStatus === 'all' ? '' : activeStatus.replace('_', ' ') + ' '}requests yet. Submit one using the form.</div>`;
      return;
    }

    $('#board').innerHTML = filtered.map(req => {
      const statusLabel = req.status.replace(/_/g, ' ');
      const submitter = req.user_name || (req.user_email ? req.user_email.split('@')[0] : 'Anonymous');
      return `
        <article class="req-card" data-id="${req.id}">
          <div class="req-head">
            <span class="req-num">IR-${String(req.id).padStart(3, '0')}</span>
            <span class="pill cat-${req.category}">${escapeHtml(req.category)}</span>
            <span class="pill prio-${req.priority}">${escapeHtml(req.priority)}</span>
            <span class="pill status-${req.status}">${escapeHtml(statusLabel)}</span>
          </div>
          <h3>${escapeHtml(req.title)}</h3>
          <div class="desc">${escapeHtml(req.description)}</div>
          <div class="req-meta">
            <span>by <strong>${escapeHtml(submitter)}</strong></span>
            <span>&middot; ${timeAgo(req.created_at)}</span>
          </div>
        </article>
      `;
    }).join('');
  }

  // ── Tab switching ─────────────────────────────────────────────
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeStatus = tab.dataset.status;
      renderBoard();
    });
  });

  // ── Card click (delegated) ─────────────────────────────────────
  $('#board').addEventListener('click', (e) => {
    const card = e.target.closest('.req-card');
    if (!card) return;
    const id = parseInt(card.dataset.id, 10);
    if (id) openDetail(id);
  });

  // ── Detail modal ───────────────────────────────────────────────
  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso + 'Z');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
  }

  let teamMembers = [];
  async function loadTeam() {
    try {
      const r = await fetch('/api/improvement-requests/team');
      if (r.ok) teamMembers = await r.json();
    } catch (e) { /* non-fatal */ }
  }

  let currentDetailId = null;

  function openDetail(id) {
    const req = allRequests.find(r => r.id === id);
    if (!req) return;
    currentDetailId = id;
    const statusLabel = req.status.replace(/_/g, ' ');
    const submitter = req.user_name || (req.user_email ? req.user_email.split('@')[0] : 'Anonymous');

    const statusOptions = ['new', 'under_review', 'planned', 'in_progress', 'completed', 'declined']
      .map(s => `<option value="${s}" ${req.status === s ? 'selected' : ''}>${s.replace(/_/g, ' ')}</option>`)
      .join('')
      + '<option value="__delete__" style="color:#dc2626;">Remove</option>';

    const assignOptions = [`<option value="">— Unassigned —</option>`]
      .concat(teamMembers.map(t => {
        const label = t.name ? `${t.name} (${t.email})` : t.email;
        const selected = req.assigned_to === t.email ? 'selected' : '';
        return `<option value="${escapeHtml(t.email)}" ${selected}>${escapeHtml(label)}</option>`;
      }))
      .join('');

    $('#detailContent').innerHTML = `
      <div class="detail-id">IR-${String(req.id).padStart(3, '0')}</div>
      <div class="detail-title">${escapeHtml(req.title)}</div>
      <div class="detail-pills">
        <span class="pill cat-${req.category}">${escapeHtml(req.category)}</span>
        <span class="pill prio-${req.priority}">${escapeHtml(req.priority)}</span>
      </div>
      <div class="detail-section">
        <label>Description</label>
        <p>${escapeHtml(req.description)}</p>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;">
        <div class="field" style="margin-bottom:0;">
          <label for="d-status">Status</label>
          <select id="d-status" style="width:100%; padding:9px 12px; border:1.5px solid var(--border); border-radius:9px; font-size:0.88rem; background:#fafbfd; text-transform:capitalize;">
            ${statusOptions}
          </select>
        </div>
        <div class="field" style="margin-bottom:0;">
          <label for="d-assign">Assign to</label>
          <select id="d-assign" style="width:100%; padding:9px 12px; border:1.5px solid var(--border); border-radius:9px; font-size:0.88rem; background:#fafbfd;">
            ${assignOptions}
          </select>
        </div>
      </div>
      <button id="d-save" onclick="saveDetail()" style="width:100%; padding:10px; border-radius:10px; border:none; background:linear-gradient(135deg, #10b981, #3b82f6); color:white; font-weight:700; font-size:0.88rem; cursor:pointer; box-shadow:0 4px 14px rgba(16,185,129,0.25); transition:transform 0.1s;" onmouseover="this.style.transform='translateY(-1px)'" onmouseout="this.style.transform=''">
        Save Changes
      </button>
      <div id="d-msg" style="margin-top:10px; font-size:0.82rem; text-align:center;"></div>
      <div class="detail-meta" style="margin-top:16px;">
        <div class="item">
          <label>Submitted by</label>
          <span>${escapeHtml(submitter)}</span>
        </div>
        <div class="item">
          <label>Email</label>
          <span>${req.user_email ? escapeHtml(req.user_email) : '—'}</span>
        </div>
        <div class="item">
          <label>Submitted</label>
          <span>${formatDate(req.created_at)}</span>
        </div>
        <div class="item">
          <label>Resolved</label>
          <span>${req.resolved_at ? formatDate(req.resolved_at) : 'Pending'}</span>
        </div>
      </div>
    `;
    $('#modalBg').classList.add('show');
  }

  async function saveDetail() {
    if (!currentDetailId) return;
    const btn = $('#d-save');
    const msg = $('#d-msg');
    btn.disabled = true;
    btn.textContent = 'Saving...';
    msg.textContent = '';
    msg.style.color = '';

    const statusVal = $('#d-status').value;

    // Handle delete
    if (statusVal === '__delete__') {
      if (!confirm('Are you sure you want to permanently remove this request?')) {
        btn.disabled = false;
        btn.textContent = 'Save Changes';
        return;
      }
      try {
        const r = await fetch(`/api/improvement-requests/${currentDetailId}`, { method: 'DELETE' });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
        $('#modalBg').classList.remove('show');
        await loadRequests();
        return;
      } catch (err) {
        msg.style.color = '#dc2626';
        msg.textContent = 'Failed: ' + err.message;
        btn.disabled = false;
        btn.textContent = 'Save Changes';
        return;
      }
    }

    const body = {
      status: statusVal,
      assigned_to: $('#d-assign').value,
    };

    try {
      const r = await fetch(`/api/improvement-requests/${currentDetailId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
      msg.style.color = '#16a34a';
      msg.textContent = 'Saved!';
      await loadRequests();
    } catch (err) {
      msg.style.color = '#dc2626';
      msg.textContent = 'Failed: ' + err.message;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Changes';
    }
  }

  // Close modal
  $('#modalClose').addEventListener('click', () => $('#modalBg').classList.remove('show'));
  $('#modalBg').addEventListener('click', (e) => {
    if (e.target === $('#modalBg')) $('#modalBg').classList.remove('show');
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') $('#modalBg').classList.remove('show');
  });

  // ── Init ──────────────────────────────────────────────────────
  loadTeam();
  loadRequests();
</script>
</body>
</html>
