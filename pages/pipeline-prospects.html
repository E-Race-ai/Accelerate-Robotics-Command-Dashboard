<style>
  * { font-family: 'Inter', system-ui, sans-serif; }
  h1, h2, h3, .headline { font-family: 'Space Grotesk', 'Inter', sans-serif; }

  .chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 100px; font-size: 0.7rem; font-weight: 600; cursor: pointer; transition: all 0.15s; border: 1.5px solid transparent; user-select: none; }
  .chip:hover { transform: translateY(-1px); }
  .chip.active { border-color: currentColor; }

  /* WHY: prospect-card styles removed — now using brand-deal-card from brand.css */

  .monogram { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem; color: white; flex-shrink: 0; }

  /* WHY: stat-pill styles removed — now using brand-stat classes from brand.css */

  .sort-btn { cursor: pointer; user-select: none; }
  .sort-btn:hover { color: #2563eb; }
  .sort-btn .sort-arrow { display: inline-block; width: 14px; text-align: center; }

  /* Table styles */
  .prospect-table { width: 100%; border-collapse: collapse; }
  .prospect-table th { position: sticky; top: 0; background: #f9fafb; padding: 10px 14px; text-align: left; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: #6b7280; border-bottom: 2px solid #e5e7eb; z-index: 1; white-space: nowrap; }
  .prospect-table td { padding: 10px 14px; font-size: 0.85rem; border-bottom: 1px solid #f3f4f6; }
  .prospect-table tr:hover td { background: #f8fafc; }
  .prospect-table .name-cell { font-weight: 600; color: #111827; }
  .prospect-table .signal-cell { font-size: 0.78rem; color: #6b7280; max-width: 260px; }

  /* Convert to deal modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .modal { background: white; border-radius: 20px; padding: 32px; width: 90%; max-width: 480px; box-shadow: 0 24px 48px rgba(0,0,0,0.15); }

  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    *, *::before, *::after { animation: none !important; transition: none !important; }
    .brand-nav, .no-print { display: none !important; }
    .brand-deal-card { break-inside: avoid; box-shadow: none !important; transform: none !important; border: 1px solid #ddd !important; }
    .brand-stat { break-inside: avoid; box-shadow: none !important; transform: none !important; }
    .brand-stat-val, .gradient-text { -webkit-text-fill-color: var(--text) !important; background: none !important; }
    .brand-reveal { opacity: 1 !important; transform: none !important; }
    .monogram { -webkit-print-color-adjust: exact; print-color-adjust: exact; border-radius: 10px !important; -webkit-border-radius: 10px !important; }
  }
</style>

const CLUSTER_LABELS = {'sf-bay':'SF Bay Area','sacramento':'Sacramento','la-west':'LA West','san-diego':'San Diego','south-fl':'South Florida','gulf-fl':'Gulf Coast FL','dallas':'Dallas'};
const BRAND_CLASS_COLORS = {luxury:'#7c3aed',soft:'#2563eb',chain:'#6b7280',independent:'#16a34a'};
const BRAND_CLASS_BG = {luxury:'bg-purple-50 text-purple-700',soft:'bg-blue-50 text-blue-700',chain:'bg-gray-100 text-gray-600',independent:'bg-green-50 text-green-700'};

// ── State ─────────────────────────────────────────────────────────
let currentView = 'card';
let sortField = 'keys';
let sortDir = -1; // -1 = descending
let clusterFilter = 'all';
let brandFilter = 'all';

// ── Helpers ───────────────────────────────────────────────────────
function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getFiltered() {
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
  return PROSPECTS.filter(p => {
    if (clusterFilter !== 'all' && p.cluster !== clusterFilter) return false;
    if (brandFilter !== 'all' && p.brandClass !== brandFilter) return false;
    if (q) {
      const hay = [p.name, p.market, p.brand, p.operator, p.signal, p.address].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  }).sort((a, b) => {
    if (sortField === 'name') return sortDir * a.name.localeCompare(b.name);
    return sortDir * ((a[sortField] || 0) - (b[sortField] || 0));
  });
}

// ── Render ─────────────────────────────────────────────────────────
function renderAll() {
  const filtered = getFiltered();
  renderStats(filtered);
  renderCards(filtered);
  renderTable(filtered);
  document.getElementById('resultCount').textContent = `${filtered.length} of ${PROSPECTS.length} prospects`;
  document.getElementById('emptyState').classList.toggle('hidden', filtered.length > 0);
  document.getElementById('cardView').classList.toggle('hidden', currentView !== 'card' || filtered.length === 0);
  document.getElementById('tableView').classList.toggle('hidden', currentView !== 'table' || filtered.length === 0);
}

function renderStats(filtered) {
  const totalKeys = filtered.reduce((s, p) => s + (p.keys || 0), 0);
  const markets = new Set(filtered.map(p => p.market)).size;
  const luxury = filtered.filter(p => p.brandClass === 'luxury').length;
  const avgFloors = filtered.length ? Math.round(filtered.reduce((s, p) => s + (p.floors || 0), 0) / filtered.length) : 0;

  const stats = [
    {val: filtered.length, lbl: 'Prospects'},
    {val: markets, lbl: 'Markets'},
    {val: totalKeys, lbl: 'Total Keys'},
    {val: luxury, lbl: 'Luxury'},
    {val: avgFloors, lbl: 'Avg Floors'},
  ];
  document.getElementById('statsRow').innerHTML = stats.map(s =>
    `<div class="brand-stat"><span class="brand-stat-val" data-counter="${s.val}">${s.val}</span><span class="brand-stat-lbl">${s.lbl}</span></div>`
  ).join('');
  /* WHY: Re-init counters after dynamic stat render so data-counter attributes animate */
  initCounters();
}

/* WHY: Map brand class to stripe gradient so card tier is visible at a glance */
const STRIPE_GRADIENTS = {
  luxury: 'linear-gradient(180deg, #f59e0b, #fbbf24)',      /* amber — luxury tier */
  soft: 'linear-gradient(180deg, var(--teal), #67e8f9)',      /* teal — soft brand */
  chain: 'linear-gradient(180deg, var(--blue), var(--cyan))', /* blue — chain */
  independent: 'linear-gradient(180deg, var(--purple), #a78bfa)', /* purple — independent */
};

function renderCards(filtered) {
  const el = document.getElementById('cardView');
  el.innerHTML = filtered.map((p, i) => {
    const bcClass = BRAND_CLASS_BG[p.brandClass] || 'bg-gray-100 text-gray-600';
    const stripe = STRIPE_GRADIENTS[p.brandClass] || STRIPE_GRADIENTS.chain;
    /* WHY: Stagger card reveals by 30ms per card, capped at 600ms to avoid long waits on large sets */
    const delay = Math.min(i * 0.03, 0.6);
    return `
    <div class="brand-deal-card brand-reveal" data-delay="${delay}">
      <div class="brand-deal-stripe" style="background:${stripe}"></div>
      <div class="flex items-start gap-3 mb-3" style="padding-left:8px;">
        <div class="monogram" style="background:${p.monoColor}">${p.monogram}</div>
        <div class="flex-1 min-w-0">
          <div class="brand-deal-name text-[0.95rem] leading-tight">${esc(p.name)}</div>
          <div class="brand-deal-meta mt-0.5">${esc(p.address)} &middot; ${esc(p.market)}</div>
          <span class="inline-block text-[0.65rem] font-semibold px-2 py-0.5 rounded mt-1 ${bcClass}">${esc(p.brand)}</span>
        </div>
      </div>
      <div class="grid grid-cols-3 gap-2 bg-gray-50 rounded-lg p-3 mb-3" style="margin-left:8px;">
        <div class="text-center"><div class="font-bold text-gray-900">${p.keys || '—'}</div><div class="text-[0.6rem] text-gray-400 uppercase">Keys</div></div>
        <div class="text-center"><div class="font-bold text-gray-900">${p.floors || '—'}</div><div class="text-[0.6rem] text-gray-400 uppercase">Floors</div></div>
        <div class="text-center"><div class="font-bold text-gray-900">${p.stars ? '★'.repeat(p.stars) : '—'}</div><div class="text-[0.6rem] text-gray-400 uppercase">Stars</div></div>
      </div>
      <div class="text-xs text-gray-500 leading-relaxed mb-3" style="padding-left:8px;"><strong class="text-blue-600">Signal:</strong> ${esc(p.signal)}</div>
      <div class="flex items-center justify-between" style="padding-left:8px;">
        <div class="text-xs text-gray-400">
          <span class="font-medium text-gray-500">${esc(p.operator)}</span>
          ${p.portfolio ? `<span class="ml-1 inline-block text-[0.6rem] font-semibold px-2 py-0.5 rounded bg-amber-50 text-amber-600">${esc(p.portfolio)}</span>` : ''}
        </div>
        <button onclick="openDealModal(${PROSPECTS.indexOf(p)})" class="no-print text-[0.7rem] font-semibold text-blue-600 hover:text-blue-800 transition px-2 py-1 rounded-lg hover:bg-blue-50">+ Deal</button>
      </div>
    </div>`;
  }).join('');
  /* WHY: Re-init reveal animations after dynamic card render so staggered delays apply */
  initRevealAnimations();
}

function renderTable(filtered) {
  const el = document.getElementById('tableBody');
  el.innerHTML = filtered.map(p => {
    const bcClass = BRAND_CLASS_BG[p.brandClass] || 'bg-gray-100 text-gray-600';
    return `<tr>
      <td class="name-cell">${esc(p.name)}</td>
      <td class="text-gray-500 text-xs">${esc(p.market)}</td>
      <td><span class="inline-block text-[0.65rem] font-semibold px-2 py-0.5 rounded ${bcClass}">${esc(p.brand)}</span></td>
      <td class="font-semibold">${p.keys || '—'}</td>
      <td>${p.floors || '—'}</td>
      <td>${p.stars || '—'}</td>
      <td class="text-gray-500 text-xs">${esc(p.operator)}</td>
      <td class="signal-cell">${esc(p.signal)}</td>
      <td class="no-print"><button onclick="openDealModal(${PROSPECTS.indexOf(p)})" class="text-[0.7rem] font-semibold text-blue-600 hover:underline">+ Deal</button></td>
    </tr>`;
  }).join('');
}

// ── Controls ──────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('view-card').className = `px-3 py-1.5 text-xs font-semibold ${v==='card' ? 'bg-blue-600 text-white' : 'text-gray-500 hover:bg-gray-50'}`;
  document.getElementById('view-table').className = `px-3 py-1.5 text-xs font-semibold ${v==='table' ? 'bg-blue-600 text-white' : 'text-gray-500 hover:bg-gray-50'}`;
  renderAll();
}

function setSort(field) {
  if (sortField === field) { sortDir *= -1; } else { sortField = field; sortDir = field === 'name' ? 1 : -1; }
  // Update sort button arrows
  document.querySelectorAll('.sort-btn').forEach(b => {
    const arrow = b.querySelector('.sort-arrow');
    if (b.dataset.sort === sortField) {
      b.style.fontWeight = '700';
      b.style.color = '#2563eb';
      arrow.textContent = sortDir > 0 ? '↑' : '↓';
    } else {
      b.style.fontWeight = '';
      b.style.color = '';
      arrow.textContent = '';
    }
  });
  renderAll();
}

function toggleFilter(type, val) {
  if (type === 'cluster') clusterFilter = val;
  if (type === 'brand') brandFilter = val;
  // Update chip states
  document.querySelectorAll(`.chip[data-filter="${type}"]`).forEach(c => {
    c.classList.toggle('active', c.dataset.val === val);
  });
  renderAll();
}

// ── Deal modal ────────────────────────────────────────────────────
function openDealModal(idx) {
  const p = PROSPECTS[idx];
  document.getElementById('dealModal').classList.remove('hidden');
  document.getElementById('modalSubtitle').textContent = `${p.name} — ${p.market} (${p.keys} keys, ${p.floors} floors)`;
  document.getElementById('dealName').value = p.name;
  document.getElementById('dealFacilityName').value = p.name;
  document.getElementById('dealCity').value = p.market;
  document.getElementById('dealKeys').value = p.keys;
  document.getElementById('dealFloors').value = p.floors;
  document.getElementById('dealBrand').value = p.brand;
  document.getElementById('dealError').classList.add('hidden');
}

function closeDealModal() {
  document.getElementById('dealModal').classList.add('hidden');
}

async function submitDeal(e) {
  e.preventDefault();
  const errEl = document.getElementById('dealError');
  errEl.classList.add('hidden');

  // WHY: Create both a facility and a deal in one flow — matches the deal creation API
  const facilityName = document.getElementById('dealFacilityName').value;
  const city = document.getElementById('dealCity').value;

  try {
    // Create deal via API
    const res = await fetch('/api/deals', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        name: document.getElementById('dealName').value,
        stage: document.getElementById('dealStage').value,
        owner: document.getElementById('dealOwner').value || undefined,
        facility_name: facilityName,
        facility_type: 'hotel',
        city: city,
        state: '',
        rooms_or_units: document.getElementById('dealKeys').value || undefined,
        floors: document.getElementById('dealFloors').value || undefined,
        brand: document.getElementById('dealBrand').value || undefined,
      }),
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || 'Failed to create deal');
    }
    const deal = await res.json();
    closeDealModal();
    // WHY: Navigate to the new deal so the user can add more details
    window.location.href = `/admin/deals/${deal.id}`;
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  }
}

// ── Auth / Nav Utilities ─────────────────────────────────────────
/* WHY: Matches the logout pattern from admin-command-center — clears JWT cookie and redirects */
function logout() {
  document.cookie = 'token=; Max-Age=0; path=/';
  window.location.href = '/admin/login';
}

// ── Init ──────────────────────────────────────────────────────────
setSort('keys'); // Default sort by keys descending
renderAll();
</script>
