<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Accelerate Robotics MDM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          brand: {
            50:'#e6efff',100:'#cce0ff',200:'#99c0ff',300:'#66a0ff',
            400:'#3380ff',500:'#0055ff',600:'#0044cc',700:'#003399',
            800:'#001f66',900:'#0a1628',
          }
        },
        fontFamily: {
          sans: ['Inter','system-ui','-apple-system','Segoe UI','Roboto','sans-serif'],
          display: ['Space Grotesk','Inter','system-ui','sans-serif'],
        }
      }
    }
  }
</script>
<style>
  [x-cloak] { display: none !important; }
  body { font-family: 'Inter', system-ui, sans-serif; }
  h1, h2, h3, h4, .headline { font-family: 'Space Grotesk', 'Inter', sans-serif; letter-spacing: -0.01em; }
  .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  .dark .scrollbar-thin::-webkit-scrollbar-thumb { background: #475569; }
  .map-bg {
    background-image:
      linear-gradient(to right, rgba(148,163,184,0.15) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(148,163,184,0.15) 1px, transparent 1px),
      radial-gradient(ellipse at 30% 40%, rgba(0,85,255,0.08), transparent 60%),
      radial-gradient(ellipse at 70% 60%, rgba(52,211,153,0.08), transparent 60%);
    background-size: 40px 40px, 40px 40px, 100% 100%, 100% 100%;
  }
  .dark .map-bg {
    background-image:
      linear-gradient(to right, rgba(148,163,184,0.08) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(148,163,184,0.08) 1px, transparent 1px),
      radial-gradient(ellipse at 30% 40%, rgba(0,85,255,0.15), transparent 60%),
      radial-gradient(ellipse at 70% 60%, rgba(52,211,153,0.12), transparent 60%);
  }
  kbd { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.7rem; padding: 1px 5px; border: 1px solid currentColor; border-radius: 4px; opacity: 0.6; }
</style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-100">

<div x-data="mdmApp()" x-cloak :class="dark ? 'dark' : ''" class="min-h-screen" @keydown.window.meta.k.prevent="commandOpen = true" @keydown.window.ctrl.k.prevent="commandOpen = true">

  <!-- LOGIN screen removed — this page is served behind requireAuthPage,
       so by the time it renders the visitor is already authenticated as
       a Dashboard admin. Auth state is the dashboard JWT cookie, which
       is sent automatically with every same-origin /api/mdm/* fetch. -->

  <!-- ============ MAIN APP ============ -->
  <template x-if="authed">
    <div class="flex min-h-screen">

      <!-- Sidebar -->
      <aside class="w-60 bg-brand-900 text-slate-100 flex flex-col flex-shrink-0">
        <div class="px-5 py-5 flex items-center gap-3 border-b border-white/10">
          <div class="w-9 h-9 rounded-lg bg-brand-500 flex items-center justify-center text-white font-bold headline">A</div>
          <div>
            <div class="font-bold headline leading-tight">Accelerate Robotics</div>
            <div class="text-xs text-brand-100/70">MDM · One brain. Many bots.</div>
          </div>
        </div>
        <nav class="flex-1 px-3 py-4 space-y-1 text-sm overflow-y-auto scrollbar-thin">
          <template x-for="section in navSections">
            <div class="mb-3">
              <div class="px-3 mb-1 text-[10px] font-semibold uppercase tracking-wider text-brand-100/50" x-text="section.label"></div>
              <template x-for="item in section.items">
                <button @click="view = item.id; deviceDetailTab = 'overview'"
                        :class="view === item.id ? 'bg-white/10 text-white' : 'text-brand-100/80 hover:bg-white/5 hover:text-white'"
                        class="w-full flex items-center gap-3 px-3 py-2 rounded-lg transition text-left">
                  <span x-html="item.icon" class="w-5 h-5 flex-shrink-0"></span>
                  <span x-text="item.label" class="flex-1"></span>
                  <span x-show="item.badge" x-text="item.badge" class="text-xs bg-brand-500 text-white px-2 rounded-full"></span>
                  <span x-show="item.dynamicBadge && navBadgeValue(item.dynamicBadge) > 0" x-text="navBadgeValue(item.dynamicBadge)" class="text-xs bg-brand-500 text-white px-2 rounded-full"></span>
                </button>
              </template>
            </div>
          </template>
        </nav>
        <div class="px-3 py-3 border-t border-white/10 space-y-1 text-sm">
          <button @click="view='settings'" :class="view==='settings' ? 'bg-white/10 text-white' : 'text-brand-100/80 hover:bg-white/5 hover:text-white'" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            Settings
          </button>
          <a href="/admin-command-center.html" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-brand-100/80 hover:bg-white/5 hover:text-white">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            Back to Command Center
          </a>
        </div>
      </aside>

      <!-- Main content -->
      <main class="flex-1 overflow-hidden flex flex-col">
        <!-- Top bar -->
        <div class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-6 py-3 flex items-center gap-4">
          <div class="flex-1">
            <h1 class="text-lg font-bold capitalize" x-text="viewTitle()"></h1>
            <p class="text-xs text-slate-500 dark:text-slate-400" x-text="viewSubtitle()"></p>
          </div>
          <button @click="commandOpen = true" class="flex items-center gap-2 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg px-3 py-1.5 text-sm text-slate-500 dark:text-slate-400 w-72">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <span class="flex-1 text-left">Search devices, users, apps...</span>
            <kbd>⌘K</kbd>
          </button>
          <button @click="dark = !dark" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg text-slate-500 dark:text-slate-400">
            <svg x-show="!dark" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
            <svg x-show="dark" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          </button>
          <button @click="notifOpen = !notifOpen" class="relative p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg text-slate-500 dark:text-slate-400">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
            <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-rose-500 rounded-full"></span>
          </button>
          <div class="flex items-center gap-3 pl-3 border-l border-slate-200 dark:border-slate-800">
            <div class="text-right">
              <div class="text-sm font-medium">Kaylie Murphey</div>
              <div class="text-xs text-slate-500">Owner</div>
            </div>
            <div class="w-8 h-8 rounded-full bg-brand-500 text-white flex items-center justify-center font-bold text-sm">KM</div>
          </div>
        </div>

        <!-- Views -->
        <div class="flex-1 overflow-y-auto p-6 bg-slate-50 dark:bg-slate-950">

          <!-- Mockup-data banner: shown on views that aren't yet wired to real backend -->
          <div x-show="!isViewWired(view)" class="mb-4 bg-amber-50 dark:bg-amber-950/40 border border-amber-200 dark:border-amber-900 rounded-lg px-4 py-2.5 flex items-center gap-3 text-sm">
            <svg class="w-5 h-5 text-amber-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            <div class="flex-1 text-amber-900 dark:text-amber-100">
              <strong>Mockup data.</strong> This view is wireframe-only — the numbers, lists, and buttons here are placeholders. Wiring planned for next sprint. Real, live data is on <button @click="view='devices'" class="underline">Devices</button>, <button @click="view='enroll'" class="underline">Enroll</button>, and <button @click="view='onboarding'" class="underline">Onboarding</button>.
            </div>
          </div>


          <!-- ===== DASHBOARD ===== -->
          <div x-show="view === 'dashboard'">
            <div class="grid grid-cols-4 gap-4 mb-6">
              <template x-for="stat in stats">
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-5">
                  <div class="text-xs text-slate-500 uppercase tracking-wide flex items-center justify-between">
                    <span x-text="stat.label"></span>
                    <span x-html="stat.icon" class="w-4 h-4 text-slate-400"></span>
                  </div>
                  <div class="text-3xl font-bold mt-2" x-text="stat.value"></div>
                  <div :class="stat.trend === 'up' ? 'text-emerald-600' : stat.trend === 'down' ? 'text-rose-600' : 'text-slate-500'" class="text-xs mt-1" x-text="stat.change"></div>
                </div>
              </template>
            </div>

            <div class="grid grid-cols-3 gap-4 mb-6">
              <div class="col-span-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-6">
                <div class="flex items-center justify-between mb-4">
                  <h2 class="font-bold">Enrollment trend</h2>
                  <div class="flex text-xs">
                    <button class="px-2 py-0.5 rounded bg-slate-100 dark:bg-slate-800">7d</button>
                    <button class="px-2 py-0.5 text-slate-500">30d</button>
                    <button class="px-2 py-0.5 text-slate-500">90d</button>
                  </div>
                </div>
                <svg viewBox="0 0 400 120" class="w-full h-32">
                  <defs><linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3d6bff" stop-opacity="0.3"/><stop offset="1" stop-color="#3d6bff" stop-opacity="0"/></linearGradient></defs>
                  <path d="M 0,90 L 50,75 L 100,80 L 150,60 L 200,55 L 250,40 L 300,35 L 350,25 L 400,20 L 400,120 L 0,120 Z" fill="url(#g1)"/>
                  <path d="M 0,90 L 50,75 L 100,80 L 150,60 L 200,55 L 250,40 L 300,35 L 350,25 L 400,20" fill="none" stroke="#3d6bff" stroke-width="2"/>
                  <template x-for="(pt, i) in [[0,90],[50,75],[100,80],[150,60],[200,55],[250,40],[300,35],[350,25],[400,20]]">
                    <circle :cx="pt[0]" :cy="pt[1]" r="3" fill="#3d6bff"/>
                  </template>
                </svg>
                <div class="flex justify-between text-xs text-slate-500 mt-2"><span>Apr 16</span><span>Apr 18</span><span>Apr 20</span><span>Apr 22</span></div>
              </div>

              <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-6">
                <h2 class="font-bold mb-4">Compliance</h2>
                <div class="space-y-4">
                  <div>
                    <div class="flex justify-between text-sm mb-1"><span>Compliant</span><span class="font-medium">22 / 24</span></div>
                    <div class="h-2 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden"><div class="h-full bg-emerald-500" style="width: 91.6%"></div></div>
                  </div>
                  <div>
                    <div class="flex justify-between text-sm mb-1"><span>Encrypted</span><span class="font-medium">24 / 24</span></div>
                    <div class="h-2 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden"><div class="h-full bg-emerald-500" style="width: 100%"></div></div>
                  </div>
                  <div>
                    <div class="flex justify-between text-sm mb-1"><span>Latest OS</span><span class="font-medium">19 / 24</span></div>
                    <div class="h-2 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden"><div class="h-full bg-amber-500" style="width: 79%"></div></div>
                  </div>
                  <div>
                    <div class="flex justify-between text-sm mb-1"><span>Policy applied</span><span class="font-medium">23 / 24</span></div>
                    <div class="h-2 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden"><div class="h-full bg-emerald-500" style="width: 95.8%"></div></div>
                  </div>
                </div>
              </div>
            </div>

            <div class="grid grid-cols-3 gap-4 mb-6">
              <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-6">
                <h2 class="font-bold mb-4">Battery health</h2>
                <div class="space-y-2 text-sm">
                  <div class="flex items-center gap-2"><span class="w-16 text-slate-500 text-xs">81–100%</span><div class="flex-1 h-3 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden"><div class="h-full bg-emerald-500" style="width:54%"></div></div><span class="w-8 text-right font-mono text-xs">13</span></div>
                  <div class="flex items-center gap-2"><span class="w-16 text-slate-500 text-xs">61–80%</span><div class="flex-1 h-3 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden"><div class="h-full bg-emerald-500" style="width:29%"></div></div><span class="w-8 text-right font-mono text-xs">7</span></div>
                  <div class="flex items-center gap-2"><span class="w-16 text-slate-500 text-xs">41–60%</span><div class="flex-1 h-3 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden"><div class="h-full bg-amber-500" style="width:12%"></div></div><span class="w-8 text-right font-mono text-xs">3</span></div>
                  <div class="flex items-center gap-2"><span class="w-16 text-slate-500 text-xs">0–40%</span><div class="flex-1 h-3 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden"><div class="h-full bg-rose-500" style="width:5%"></div></div><span class="w-8 text-right font-mono text-xs">1</span></div>
                </div>
              </div>
              <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-6">
                <h2 class="font-bold mb-4">OS distribution</h2>
                <div class="space-y-2 text-sm">
                  <div class="flex items-center gap-2"><span class="w-20 text-slate-500 text-xs">Android 13</span><div class="flex-1 h-3 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden"><div class="h-full bg-brand-500" style="width:42%"></div></div><span class="w-8 text-right font-mono text-xs">10</span></div>
                  <div class="flex items-center gap-2"><span class="w-20 text-slate-500 text-xs">Android 12</span><div class="flex-1 h-3 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden"><div class="h-full bg-brand-500" style="width:33%"></div></div><span class="w-8 text-right font-mono text-xs">8</span></div>
                  <div class="flex items-center gap-2"><span class="w-20 text-slate-500 text-xs">Android 11</span><div class="flex-1 h-3 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden"><div class="h-full bg-brand-500" style="width:17%"></div></div><span class="w-8 text-right font-mono text-xs">4</span></div>
                  <div class="flex items-center gap-2"><span class="w-20 text-slate-500 text-xs">Android 10</span><div class="flex-1 h-3 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden"><div class="h-full bg-amber-500" style="width:8%"></div></div><span class="w-8 text-right font-mono text-xs">2</span></div>
                </div>
              </div>
              <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-6">
                <h2 class="font-bold mb-4">Command queue</h2>
                <div class="space-y-2 text-sm">
                  <div class="flex justify-between items-center"><span>Delivered (24h)</span><span class="font-bold text-emerald-600">142</span></div>
                  <div class="flex justify-between items-center"><span>Pending</span><span class="font-bold">3</span></div>
                  <div class="flex justify-between items-center"><span>Failed (24h)</span><span class="font-bold text-rose-600">1</span></div>
                  <div class="flex justify-between items-center"><span>Avg delivery</span><span class="font-mono text-xs text-slate-500">4.2s</span></div>
                </div>
                <button @click="view='activity'" class="mt-4 text-xs text-brand-600 hover:text-brand-700 font-medium">View all →</button>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-6">
                <h2 class="font-bold mb-4">Recent activity</h2>
                <div class="space-y-3">
                  <template x-for="event in activity.slice(0,6)">
                    <div class="flex items-start gap-3 pb-3 border-b border-slate-100 dark:border-slate-800 last:border-0 last:pb-0">
                      <div :class="eventColor(event.type)" class="w-2 h-2 rounded-full mt-1.5"></div>
                      <div class="flex-1">
                        <div class="text-sm"><span class="font-medium" x-text="event.device"></span> <span x-text="event.action"></span></div>
                        <div class="text-xs text-slate-500 mt-0.5" x-text="event.time"></div>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
              <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-6">
                <h2 class="font-bold mb-4">Open alerts</h2>
                <div class="space-y-3">
                  <template x-for="alert in openAlerts">
                    <div class="flex items-start gap-3 p-3 rounded-lg border border-slate-100 dark:border-slate-800">
                      <div :class="alert.level === 'high' ? 'bg-rose-100 text-rose-600' : alert.level === 'med' ? 'bg-amber-100 text-amber-600' : 'bg-slate-100 text-slate-500'" class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                      </div>
                      <div class="flex-1 min-w-0">
                        <div class="text-sm font-medium truncate" x-text="alert.title"></div>
                        <div class="text-xs text-slate-500" x-text="alert.time"></div>
                      </div>
                      <button class="text-xs text-brand-600 hover:text-brand-700">Dismiss</button>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </div>

          <!-- ===== DEVICES ===== -->
          <div x-show="view === 'devices'">
            <div class="flex items-center gap-2 mb-5">
              <input x-model="deviceFilter" placeholder="Search devices..." class="border border-slate-300 dark:border-slate-700 rounded-lg px-3 py-2 text-sm w-64 bg-white dark:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-brand-500" />
              <select x-model="deviceStatusFilter" class="border border-slate-300 dark:border-slate-700 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-900">
                <option value="">All statuses</option><option>Compliant</option><option>Non-compliant</option><option>Offline</option>
              </select>
              <select x-model="deviceGroupFilter" class="border border-slate-300 dark:border-slate-700 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-900">
                <option value="">All groups</option>
                <template x-for="g in groups"><option x-text="g.name" :value="g.name"></option></template>
              </select>
              <div class="flex-1"></div>
              <button @click="loadDevices()" :disabled="devicesLoading" class="border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-2 rounded-lg text-sm hover:bg-slate-50 dark:hover:bg-slate-800 disabled:opacity-60">
                <span x-show="!devicesLoading">Refresh</span>
                <span x-show="devicesLoading">Loading…</span>
              </button>

    filteredDevices() {
      const q = this.deviceFilter.toLowerCase();
      return this.devices.filter(d => {
        if (q && !(d.name.toLowerCase().includes(q) || d.user.toLowerCase().includes(q) || d.serial.toLowerCase().includes(q))) return false;
        if (this.deviceStatusFilter && d.status !== this.deviceStatusFilter) return false;
        if (this.deviceGroupFilter && d.group !== this.deviceGroupFilter) return false;
        return true;
      });
    },

      const i = this.selected.indexOf(id);
      if (i >= 0) this.selected.splice(i,1); else this.selected.push(id);

      this.selected = on ? this.filteredDevices().map(d => d.id) : [];

    // ===== Init helper =====
    afterLogin() {
      // Load whichever view they're starting on. Name retained for clarity
      // even though there's no longer a per-page sign-in step.
      if (this.view === 'devices') { this.loadDevices(); this.startDevicesPolling(); }
      if (this.view === 'enroll') this.loadEnrollmentTokens();
    },

    // ===== API helper =====
    // All requests are same-origin and rely on the dashboard's JWT cookie
    // for auth (sent automatically). On 401 we redirect to the dashboard
    // login page rather than showing our own form.
    async apiCall(method, path, body = null) {
      const opts = {
        method,
        headers: { Accept: 'application/json' },
        // credentials: 'same-origin' is the default; documented for clarity.
      };
      if (body !== null) {
        opts.headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
      }
      const r = await fetch('/api/mdm' + path, opts);
      if (r.status === 401) {
        // Dashboard session expired — bounce to login.
        window.location.href = '/admin-command-center.html';
        throw new Error('Session expired — redirecting to sign in.');
      }
      if (r.status === 204) return null;
      if (!r.ok) {
        let msg = `${method} ${path} → ${r.status}`;
        try {
          const body = await r.json();
          if (body && body.detail) msg += ': ' + JSON.stringify(body.detail);
          else if (body && body.error) msg += ': ' + body.error;
        } catch { /* ignore */ }
        throw new Error(msg);
      }
      const ctype = r.headers.get('content-type') || '';
      if (ctype.includes('application/json')) return await r.json();
      return r;
    },

    // Same-origin image URLs send the JWT cookie automatically — no
    // need for the blob-URL workaround the standalone tool used.
    // Keeping the function name for callsite stability; it just returns
    // the path verbatim now.
    async fetchAuthedBlobUrl(fullPath) {
      return fullPath;
    },

    // ===== Devices =====
    async loadDevices() {
      this.devicesLoading = true;
      this.devicesError = '';
      try {
        const list = await this.apiCall('GET', '/devices');
        this.devices = list.map(this.mapAmapiDevice);
      } catch (e) {
        this.devicesError = e.message;
        this.devices = [];
      } finally {
        this.devicesLoading = false;
      }
    },

    mapAmapiDevice(d) {
      const hw = d.hardware_info || {};
      const sw = d.software_info || {};
      const stateMap = { ACTIVE: 'Compliant', DISABLED: 'Non-compliant', DELETED: 'Offline', PROVISIONING: 'Pending' };
      const fmtTime = (ts) => {
        if (!ts) return '—';
        try {
          const diff = (Date.now() - new Date(ts).getTime()) / 1000;
          if (diff < 60) return 'Just now';
          if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
          if (diff < 86400) return Math.floor(diff / 3600) + ' hr ago';
          return Math.floor(diff / 86400) + ' d ago';
        } catch { return ts; }
      };
      return {
        id: d.device_id,
        name: hw.deviceBrand && hw.model ? `${hw.deviceBrand} ${hw.model}` : ('Device ' + d.device_id.substring(0, 8)),
        serial: hw.serialNumber || d.device_id.substring(0, 12),
        user: d.management_mode || '—',
        group: (d.name || '').includes('/policies/') ? d.name.split('/policies/')[1] : 'default',
        os: sw.androidVersion ? `Android ${sw.androidVersion}` : 'Android',
        status: stateMap[d.state] || d.state || '—',
        lastSeen: fmtTime(d.last_status_report_time || d.enrollment_time),
        model: hw.model || '—',
        battery: 100,
        _raw: d,
      };
    },

    async issueDeviceCommand(deviceId, type) {
      try {
        const op = await this.apiCall('POST', `/devices/${deviceId}/commands`, { type });
        this.toast(`${type} queued · operation ${op.operation_name.split('/').pop()}`);
      } catch (e) {
        this.toast(`${type} failed: ${e.message}`);
      }
    },

    async bulkLock() {
      const ids = this.selected.slice();
      if (!ids.length) return;
      this.toast(`Locking ${ids.length} devices…`);
      let ok = 0, fail = 0;
      for (const id of ids) {
        try {
          await this.apiCall('POST', `/devices/${id}/commands`, { type: 'LOCK' });
          ok++;
        } catch { fail++; }
      }
      this.toast(`Lock done · ${ok} succeeded, ${fail} failed`);
      this.selected = [];
    },

    // ===== Enrollment =====
    async generateEnrollmentToken() {
      this.enrollment.busy = true;
      this.enrollment.error = '';
      try {
        const tok = await this.apiCall('POST', '/enrollment-tokens');
        this.enrollment.qrPayload = tok;
        this.enrollment.expirationTimestamp = tok.expiration_timestamp;
        const url = new URL(tok.qr_png_url, window.location.origin);
        if (this.enrollment.qrUrl) URL.revokeObjectURL(this.enrollment.qrUrl);
        this.enrollment.qrUrl = await this.fetchAuthedBlobUrl(url.pathname + url.search);
        // (path already includes /api prefix from the backend's url_for)
        // Refresh token list in background
        this.loadEnrollmentTokens();
      } catch (e) {
        this.enrollment.error = e.message;
      } finally {
        this.enrollment.busy = false;
      }
    },

    async loadEnrollmentTokens() {
      this.enrollment.tokenListBusy = true;
      this.enrollment.tokenListError = '';
      try {
        const list = await this.apiCall('GET', '/enrollment-tokens');
        this.enrollment.tokens = Array.isArray(list) ? list : [];
      } catch (e) {
        this.enrollment.tokenListError = e.message;
      } finally {
        this.enrollment.tokenListBusy = false;
      }
    },

    async revokeToken(tokenName) {
      const id = tokenName.split('/').pop();
      try {
        await this.apiCall('DELETE', `/enrollment-tokens/${id}`);
        this.toast('Token revoked');
        this.loadEnrollmentTokens();
      } catch (e) {
        this.toast('Revoke failed: ' + e.message);
      }
    },

    tokenIdFromName(name) {
      return (name || '').split('/').pop() || '—';
    },

    navBadgeValue(key) {
      if (key === 'deviceCount') return this.devices.length;
      return 0;
    },

    isViewWired(v) {
      return ['devices', 'enroll', 'onboarding'].includes(v);
    },

    _devicesPoll: null,
    startDevicesPolling() {
      this.stopDevicesPolling();
      this._devicesPoll = setInterval(() => {
        if (this.view === 'devices' && this.authed) this.loadDevices();
      }, 15000);
    },
    stopDevicesPolling() {
      if (this._devicesPoll) { clearInterval(this._devicesPoll); this._devicesPoll = null; }
    },

    formatExpiry(ts) {
      if (!ts) return '—';
      try {
        const t = new Date(ts).getTime();
        const diff = Math.floor((t - Date.now()) / 1000);
        if (diff < 0) return 'expired';
        if (diff < 60) return 'in ' + diff + 's';
        if (diff < 3600) return 'in ' + Math.floor(diff / 60) + 'm';
        if (diff < 86400) return 'in ' + Math.floor(diff / 3600) + 'h ' + Math.floor((diff % 3600) / 60) + 'm';
        return 'in ' + Math.floor(diff / 86400) + 'd';
      } catch { return ts; }
    },

    // ===== Init =====
    init() {
      this.$watch('view', (v) => {
        if (!this.authed) return;
        if (v === 'devices') { this.loadDevices(); this.startDevicesPolling(); }
        else { this.stopDevicesPolling(); }
        if (v === 'enroll') this.loadEnrollmentTokens();
      });
      if (this.authed) this.afterLogin();
    },
  }
}
</script>
