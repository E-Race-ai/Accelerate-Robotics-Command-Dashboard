<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Accelerate Robotics — Business Card</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Print-shop-ready PDF export: html-to-image rasterises each card (handles
     webfonts + absolutely-positioned SVGs better than html2canvas), jsPDF
     wraps it in a 3.75x2.25 in page (3.5x2 trim + 0.125 bleed) for Staples. -->
<script src="https://unpkg.com/html-to-image@1.11.13/dist/html-to-image.js"></script>
<script src="https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>

<style>
  :root {
    --ink:    #1A1814;        /* warm near-black */
    --ink-2:  #2A2620;
    --paper:  #F4F0E8;        /* warm cream */
    --paper-2:#EBE6DA;
    --rule:   rgba(26,24,20,0.18);
    --muted:  rgba(26,24,20,0.55);
    --accent: #FF6A3D;        /* matches the logo orange */

    --card-w: 3.5in;
    --card-h: 2in;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper-2);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ─────────── Workspace chrome (screen only) ─────────── */
  .workspace {
    min-height: 100vh;
    padding: 64px 32px 96px;
    display: flex; flex-direction: column; align-items: center; gap: 36px;
  }
  .workspace-header {
    width: 100%; max-width: 920px;
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 24px; flex-wrap: wrap;
  }
  .workspace-header h1 {
    margin: 0;
    font: 500 13px/1.2 'Inter', sans-serif;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .workspace-header h1 .accent { color: var(--accent); margin-right: 10px; font-weight: 600; }
  .workspace-header p {
    margin: 6px 0 0;
    font: 400 11px/1.4 'JetBrains Mono', monospace;
    color: var(--muted);
  }
  .actions { display: flex; gap: 8px; }
  .btn {
    appearance: none; border: 1px solid var(--ink); background: var(--ink); color: var(--paper);
    font: 500 11px/1 'Inter', sans-serif;
    letter-spacing: 0.14em; text-transform: uppercase;
    padding: 11px 16px; cursor: pointer; border-radius: 0;
    transition: background 0.15s ease;
  }
  .btn:hover { background: var(--accent); border-color: var(--accent); }
  .btn.ghost { background: transparent; color: var(--ink); }
  .btn.ghost:hover { background: var(--ink); color: var(--paper); }

  .stage {
    display: grid;
    grid-template-columns: var(--card-w) var(--card-w);
    gap: 48px;
    align-items: start;
    justify-content: center;
  }
  .card-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    position: relative;
  }
  .card-label {
    font: 400 10px/1 'JetBrains Mono', monospace;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ─────────── The card ─────────── */
  .card {
    width: var(--card-w);
    height: var(--card-h);
    background: var(--paper);
    color: var(--ink);
    position: relative;
    overflow: hidden;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.6) inset,
      0 24px 50px -28px rgba(26,24,20,0.30),
      0 6px 16px -8px rgba(26,24,20,0.18);

    --pad-x: 0.30in;
    --pad-y: 0.28in;
  }
  .card.--ink { background: var(--ink); color: var(--paper); }
  .card.--ink .rule { background: rgba(244,240,232,0.20); }
  .card.--ink .muted { color: rgba(244,240,232,0.55); }
  .card.--ink .lbl { color: rgba(244,240,232,0.42); }

  /* ── Front ── */
  .front {
    height: 100%;
    padding: var(--pad-y) var(--pad-x);
    display: grid;
    grid-template-rows: 1fr auto;
    grid-template-columns: minmax(0, 1fr);
    position: relative;
    z-index: 1;
  }

  /* Subtle nested-chevron watermark, peeking off the upper-right edge */
  .front-watermark {
    position: absolute;
    right: -0.45in;
    top: -0.55in;
    width: 2.30in;
    height: auto;
    opacity: 0.10;
    pointer-events: none;
    z-index: 0;
  }
  .card.--ink .front-watermark { opacity: 0.16; }

  /* Middle: name set in serif for sophistication */
  .person {
    align-self: center;
    margin-top: 4px;
    position: relative;
    z-index: 2;
  }
  .person .name {
    margin: 0;
    font: 400 26px/1.05 'Fraunces', 'Times New Roman', serif;
    font-variation-settings: "opsz" 144;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .card.--ink .person .name { color: var(--paper); }
  .person .role {
    margin-top: 6px;
    font: 400 10px/1.3 'JetBrains Mono', monospace;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Bottom: contact, sits beneath a hairline rule */
  .contact {
    border-top: 1px solid var(--rule);
    padding-top: 9px;
    display: grid;
    grid-template-columns: minmax(0, auto) minmax(0, 1fr);
    column-gap: 14px;
    row-gap: 4px;
    align-items: baseline;
    font: 400 10px/1.3 'JetBrains Mono', monospace;
    position: relative;
    z-index: 2;
  }
  .card.--ink .contact { border-top-color: rgba(244,240,232,0.20); }
  .lbl {
    font-size: 8px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .val { color: inherit; }

  /* ── Back ── */
  .back {
    height: 100%;
    padding: var(--pad-y) var(--pad-x);
    display: grid;
    grid-template-rows: 1fr auto;
    grid-template-columns: minmax(0, 1fr);
  }
  .back-center {
    align-self: center;
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .lockup {
    display: flex; align-items: center; gap: 14px;
  }
  .chev-mark {
    width: 0.50in;
    height: auto;
    flex: 0 0 auto;
  }
  .lockup-text {
    display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
    text-align: left;
  }
  .lockup-name {
    font: 400 18px/1.05 'Fraunces', 'Times New Roman', serif;
    font-variation-settings: "opsz" 144;
    letter-spacing: -0.005em;
    color: var(--ink);
    white-space: nowrap;
  }
  .card.--ink .lockup-name { color: var(--paper); }
  .lockup-sub {
    font: 400 11px/1.2 'Fraunces', 'Times New Roman', serif;
    font-variation-settings: "opsz" 144;
    color: var(--muted);
    letter-spacing: 0;
    white-space: nowrap;
  }

  .back-foot {
    display: flex; justify-content: center;
    font: 400 9px/1 'JetBrains Mono', monospace;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── Editable inputs ── */
  .field {
    background: transparent;
    border: 0;
    padding: 0;
    margin: 0;
    color: inherit;
    font: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
    width: 100%;
    min-width: 0;
    max-width: 100%;
    outline: none;
    border-radius: 0;
    box-sizing: border-box;
    text-overflow: ellipsis;
    display: block;
  }
  .field.right { text-align: right; }
  .field:focus { outline: 1px dashed var(--accent); outline-offset: 3px; }
  body.edit-mode .field:hover { box-shadow: 0 1px 0 rgba(200,66,31,0.4); }

  .hint {
    font: 400 11px/1.5 'JetBrains Mono', monospace;
    color: var(--muted);
    text-align: center;
    max-width: 760px;
  }

  /* ─────────── Print ─────────── */
  @page { size: letter; margin: 0.5in; }
  @media print {
    html, body { background: #fff; }
    .workspace-header, .actions, .tweaks-panel-root, .card-label, .hint { display: none !important; }
    .workspace { padding: 0; min-height: 0; }
    .stage { gap: 0.25in; }
    .card { box-shadow: none !important; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    .field:focus { outline: none; }
    .stage { page-break-inside: avoid; break-inside: avoid; }
    .crop-marks { display: block !important; }
  }

  /* Crop marks */
  .crop-marks {
    position: absolute; inset: -0.18in;
    pointer-events: none; display: none;
  }
  @media print {
    .crop-marks::before, .crop-marks::after,
    .crop-marks > span::before, .crop-marks > span::after {
      content: ""; position: absolute; background: #000;
    }
    .crop-marks::before { top: 0; left: 0; width: 0.12in; height: 1px; }
    .crop-marks::after  { top: 0; left: 0; width: 1px; height: 0.12in; }
    .crop-marks > .tr::before { top: 0; right: 0; width: 0.12in; height: 1px; }
    .crop-marks > .tr::after  { top: 0; right: 0; width: 1px; height: 0.12in; }
    .crop-marks > .bl::before { bottom: 0; left: 0; width: 0.12in; height: 1px; }
    .crop-marks > .bl::after  { bottom: 0; left: 0; width: 1px; height: 0.12in; }
    .crop-marks > .br::before { bottom: 0; right: 0; width: 0.12in; height: 1px; }
    .crop-marks > .br::after  { bottom: 0; right: 0; width: 1px; height: 0.12in; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="card-app.jsx"></script>
</body>
</html>
