/* WHY: Moore brand palette — cream/charcoal/terracotta matches existing Moore pages */
:root {
    --bg: #faf5ef;
    --bg2: #f3ece3;
    --card: #fff;
    --text: #302e2f;
    --muted: #8a8280;
    --accent: #b07d56;
    --accent2: #8a6f47;
    --green: #2d8a4e;
    --red: #c0392b;
    --amber: #d4850a;
    --blue: #2e6da4;
    --border: rgba(48,46,47,0.1);
    --shadow: 0 2px 12px rgba(48,46,47,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Georgia', 'Times New Roman', serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Layout */
.app { display: flex; height: 100vh; }
.sidebar { width: 320px; background: var(--text); color: var(--bg); display: flex; flex-direction: column; flex-shrink: 0; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Sidebar */
.sb-header { padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.sb-header h1 { font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
.sb-header p { font-size: 0.75rem; color: rgba(255,255,255,0.5); letter-spacing: 1px; }
.sb-search { padding: 12px 20px; }
.sb-search input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); color: #fff; font-size: 0.85rem; font-family: inherit; outline: none; }
.sb-search input::placeholder { color: rgba(255,255,255,0.35); }
.sb-search input:focus { border-color: var(--accent); }
.sb-filters { padding: 0 20px 12px; display: flex; gap: 6px; flex-wrap: wrap; }
.sb-filters button { padding: 4px 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); background: transparent; color: rgba(255,255,255,0.6); font-size: 0.7rem; cursor: pointer; font-family: inherit; transition: all 0.2s; }
.sb-filters button.active, .sb-filters button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.member-list { flex: 1; overflow-y: auto; padding: 8px 12px; }
.member-list::-webkit-scrollbar { width: 4px; }
.member-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

.ml-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 10px; cursor: pointer; transition: background 0.2s; margin-bottom: 2px; }
.ml-item:hover, .ml-item.active { background: rgba(255,255,255,0.08); }
.ml-item .avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; }
.ml-item .info { flex: 1; min-width: 0; }
.ml-item .info .name { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ml-item .info .role { font-size: 0.7rem; color: rgba(255,255,255,0.45); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ml-item .spend { font-size: 0.75rem; color: var(--accent); font-weight: 600; text-align: right; white-space: nowrap; }

.sb-stats { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); }
.sb-stats .row { display: flex; justify-content: space-between; margin-bottom: 6px; }
.sb-stats .label { font-size: 0.7rem; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; }
.sb-stats .val { font-size: 0.8rem; color: var(--accent); font-weight: 600; }

/* Top bar */
.topbar { display: flex; align-items: center; padding: 16px 28px; border-bottom: 1px solid var(--border); background: var(--card); gap: 12px; }
.topbar .tabs { display: flex; gap: 4px; }
.topbar .tab { padding: 8px 18px; border-radius: 8px; border: none; background: transparent; font-family: inherit; font-size: 0.8rem; cursor: pointer; color: var(--muted); font-weight: 500; transition: all 0.2s; }
.topbar .tab.active { background: var(--text); color: #fff; }
.topbar .tab:hover:not(.active) { background: var(--bg2); }
.topbar .spacer { flex: 1; }
.topbar .compare-btn { padding: 8px 18px; border-radius: 8px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-family: inherit; font-size: 0.8rem; cursor: pointer; font-weight: 500; transition: all 0.2s; }
.topbar .compare-btn:hover { background: var(--accent); color: #fff; }
.topbar .compare-btn.on { background: var(--accent); color: #fff; }

/* Content area */
.content { flex: 1; overflow-y: auto; padding: 28px; }
.content::-webkit-scrollbar { width: 6px; }
.content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }

/* Profile view */
.profile { max-width: 900px; }
.profile-header { display: flex; gap: 24px; margin-bottom: 28px; align-items: flex-start; }
.profile-header .avatar-lg { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.8rem; flex-shrink: 0; }
.profile-header .details { flex: 1; }
.profile-header .details h2 { font-size: 1.5rem; margin-bottom: 4px; }
.profile-header .details .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 8px; }
.profile-header .details .tags { display: flex; gap: 6px; flex-wrap: wrap; }
.profile-header .details .tag { padding: 3px 10px; border-radius: 12px; font-size: 0.7rem; background: var(--bg2); color: var(--muted); }
.profile-header .details .tag.tier { background: var(--accent); color: #fff; }

.profile-kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
.kpi { background: var(--card); border-radius: 12px; padding: 18px; box-shadow: var(--shadow); text-align: center; }
.kpi .kv { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
.kpi .kl { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

.profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.pcard { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); }
.pcard h3 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); margin-bottom: 14px; }
.pcard .prow { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
.pcard .prow:last-child { border-bottom: none; }
.pcard .prow .pl { color: var(--muted); }
.pcard .prow .pv { font-weight: 600; }
.pcard .pill-list { display: flex; flex-wrap: wrap; gap: 6px; }
.pcard .pill { padding: 4px 12px; border-radius: 14px; font-size: 0.75rem; background: var(--bg2); color: var(--text); }
.pcard .pill.match { background: rgba(176,125,86,0.15); color: var(--accent2); }

/* Compare view */
.compare-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
.compare-card { background: var(--card); border-radius: 14px; padding: 24px; box-shadow: var(--shadow); }
.compare-card .cc-header { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
.compare-card .cc-header .avatar-sm { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; flex-shrink: 0; }
.compare-card .cc-header h3 { font-size: 1rem; }
.compare-card .cc-header p { font-size: 0.75rem; color: var(--muted); }
.compare-card .cc-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
.compare-card .cc-row:last-child { border-bottom: none; }
.compare-card .cc-row .cl { color: var(--muted); }
.compare-card .cc-row .cv { font-weight: 600; }
.compare-card .cc-row .cv.high { color: var(--green); }
.compare-card .cc-row .cv.low { color: var(--red); }

/* Chat view */
.chat-wrap { display: flex; flex-direction: column; height: 100%; }
.chat-area { flex: 1; overflow-y: auto; padding: 28px; }
.chat-area::-webkit-scrollbar { width: 6px; }
.chat-area::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }
.msg { margin-bottom: 20px; }
.msg.user { text-align: right; }
.msg-header { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 6px; }
.msg-body { display: inline-block; max-width: 85%; padding: 14px 18px; border-radius: 14px; font-size: 0.88rem; line-height: 1.6; text-align: left; }
.msg.user .msg-body { background: var(--text); color: #fff; border-bottom-right-radius: 4px; }
.msg.ai .msg-body { background: var(--card); box-shadow: var(--shadow); border-bottom-left-radius: 4px; }
.msg.ai .msg-body strong { color: var(--accent2); }

.chat-input { padding: 16px 28px; border-top: 1px solid var(--border); background: var(--card); display: flex; gap: 12px; }
.chat-input input { flex: 1; padding: 12px 16px; border-radius: 12px; border: 2px solid var(--border); font-size: 0.9rem; font-family: inherit; outline: none; background: var(--bg); }
.chat-input input:focus { border-color: var(--accent); }
.chat-input button { padding: 12px 24px; border-radius: 12px; border: none; background: var(--text); color: #fff; font-family: inherit; font-size: 0.85rem; cursor: pointer; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.chat-input button:hover { background: var(--accent2); }

.quick-prompts { padding: 0 28px 14px; display: flex; gap: 8px; flex-wrap: wrap; }
.quick-prompts button { padding: 6px 14px; border-radius: 16px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 0.75rem; cursor: pointer; font-family: inherit; transition: all 0.2s; }
.quick-prompts button:hover { border-color: var(--accent); color: var(--accent); }

/* Analytics view */
.analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1000px; }
.analytics-grid .pcard.full { grid-column: 1 / -1; }
.ana-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.ana-bar .ab-label { width: 110px; font-size: 0.8rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ana-bar .ab-track { flex: 1; height: 22px; background: var(--bg2); border-radius: 4px; overflow: hidden; }
.ana-bar .ab-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width 0.5s; }
.ana-bar .ab-val { font-size: 0.8rem; font-weight: 600; width: 60px; text-align: right; }

.widget-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
.widget-table th { text-align: left; padding: 8px 6px; border-bottom: 2px solid var(--border); color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 500; }
.widget-table td { padding: 8px 6px; border-bottom: 1px solid var(--border); }
.widget-table tr:last-child td { border-bottom: none; }

.typing span { display: inline-block; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; margin: 0 2px; animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }

/* Checkbox for compare */
.ml-item .compare-check { width: 18px; height: 18px; border-radius: 4px; border: 2px solid rgba(255,255,255,0.2); display: none; cursor: pointer; appearance: none; -webkit-appearance: none; flex-shrink: 0; }
.ml-item .compare-check:checked { background: var(--accent); border-color: var(--accent); }
.ml-item .compare-check:checked::after { content: '\2713'; color: #fff; font-size: 12px; display: flex; align-items: center; justify-content: center; height: 100%; }
body.compare-mode .ml-item .compare-check { display: block; }
</style>
</head>

</div>

/* ================================================================
   STATE
   ================================================================ */
let currentView = 'profile';
let selectedMember = MEMBERS[0];
let compareMode = false;
let compareSet = new Set();
let activeFilter = 'all';

/* ================================================================
   SIDEBAR — member list rendering
   ================================================================ */
function renderMemberList(members) {
    const list = document.getElementById('memberList');
    list.innerHTML = members.map(m => `
        <div class="ml-item ${m.id === selectedMember.id ? 'active' : ''}" onclick="selectMember(${m.id})" data-id="${m.id}">
            <input type="checkbox" class="compare-check" onclick="event.stopPropagation(); toggleCompareItem(${m.id})" ${compareSet.has(m.id) ? 'checked' : ''}>
            <div class="avatar" style="background:${m.avatar};color:#fff">${initials(m.name)}</div>
            <div class="info">
                <div class="name">${m.name}</div>
                <div class="role">${m.role}</div>
            </div>
            <div class="spend">$${(m.ytdSpend/1000).toFixed(1)}k</div>
        </div>
    `).join('');
}

function initials(name) {
    return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
}

function selectMember(id) {
    selectedMember = MEMBERS.find(m => m.id === id);
    renderMemberList(getFilteredMembers());
    if (currentView === 'profile') renderProfile();
}

function filterMembers() {
    renderMemberList(getFilteredMembers());
}

function getFilteredMembers() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    return MEMBERS.filter(m => {
        /* WHY: search across name, companies, role, interests — not just name */
        const text = [m.name, m.role, ...m.companies.map(c => c.name + ' ' + c.industry), ...m.interests].join(' ').toLowerCase();
        const matchesSearch = !q || text.includes(q);
        let matchesFilter = true;
        if (activeFilter === 'founders') matchesFilter = m.role.toLowerCase().includes('founder') || m.role.toLowerCase().includes('ceo') || m.role.toLowerCase().includes('owner');
        if (activeFilter === 'finance') matchesFilter = m.sector === 'finance';
        if (activeFilter === 'tech') matchesFilter = m.sector === 'tech';
        if (activeFilter === 'married') matchesFilter = m.marital === 'Married';
        if (activeFilter === 'single') matchesFilter = m.marital === 'Single';
        if (activeFilter === 'top-spend') matchesFilter = m.ytdSpend >= 30000;
        return matchesSearch && matchesFilter;
    });
}

function setFilter(filter, btn) {
    activeFilter = filter;
    document.querySelectorAll('.sb-filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterMembers();
}

function toggleCompare() {
    compareMode = !compareMode;
    document.body.classList.toggle('compare-mode', compareMode);
    document.getElementById('compareBtn').classList.toggle('on', compareMode);
    if (!compareMode && compareSet.size >= 2) renderCompare();
    if (!compareMode) { compareSet.clear(); renderMemberList(getFilteredMembers()); }
}

function toggleCompareItem(id) {
    if (compareSet.has(id)) compareSet.delete(id); else compareSet.add(id);
    if (compareSet.size >= 2) renderCompare();
}

function renderCompare() {
    switchView('profile', document.querySelector('.tab'));
    const members = MEMBERS.filter(m => compareSet.has(m.id));

/* ================================================================

   ================================================================ */
function switchView(view, tab) {
    currentView = view;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    if (tab) tab.classList.add('active');
    document.getElementById('profileView').style.display = view === 'profile' ? '' : 'none';
    document.getElementById('analyticsView').style.display = view === 'analytics' ? '' : 'none';
    document.getElementById('chatView').style.display = view === 'chat' ? '' : 'none';
    if (view === 'profile') renderProfile();
    if (view === 'analytics') renderAnalytics();
    if (view === 'chat' && !document.getElementById('chatArea').children.length) initChat();
}

/* ================================================================
   CHAT — Natural Language Query Engine
   ================================================================ */
function initChat() {
    addChatMsg(`Welcome to <strong>Moore Member Intelligence</strong>. I have full profiles on all <strong>10 members</strong> — spend history, interests, companies, preferences, and more.<br><br>
    Try asking:<br>
    &bull; <strong>"Who are the top 3 spenders?"</strong><br>
    &bull; <strong>"Compare Nat and TJ"</strong><br>
    &bull; <strong>"Which members are into crypto?"</strong><br>
    &bull; <strong>"Who should I seat together at dinner?"</strong><br>
    &bull; <strong>"Show me Grant Johnson's profile"</strong>`, 'ai');
}

function addChatMsg(html, type) {
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'msg ' + type;
    div.innerHTML = `<div class="msg-header">${type === 'ai' ? 'Moore Intelligence' : 'You'}</div><div class="msg-body">${html}</div>`;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
}

function sendChat() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    addChatMsg(text, 'user');
    /* WHY: typing indicator with 600ms delay feels responsive */
    const area = document.getElementById('chatArea');
    const typing = document.createElement('div');
    typing.className = 'msg ai';
    typing.id = 'typing';
    typing.innerHTML = `<div class="msg-header">Moore Intelligence</div><div class="msg-body"><div class="typing"><span></span><span></span><span></span></div></div>`;
    area.appendChild(typing);
    area.scrollTop = area.scrollHeight;
    setTimeout(() => {
        typing.remove();
        addChatMsg(processQuery(text), 'ai');
    }, 600);
}

function askChat(text) {
    document.getElementById('chatInput').value = text;
    sendChat();
}

function processQuery(text) {
    const t = text.toLowerCase();

    /* ---- Member lookup by name ---- */
    const mentioned = MEMBERS.filter(m => {
        const parts = m.name.toLowerCase().split(' ');
        return parts.some(p => t.includes(p));
    });

    /* ---- Compare two or more members ---- */
    if ((t.includes('compare') || t.includes('vs') || t.includes('versus') || t.includes('difference')) && mentioned.length >= 2) {
        const shared = getSharedInterests(mentioned);
        return `<strong>Comparing ${mentioned.map(m => m.name).join(' vs ')}</strong><br><br>
            <table class="widget-table">
                <tr><th></th>${mentioned.map(m => `<th>${m.name.split(' ')[0]}</th>`).join('')}</tr>
                <tr><td style="color:var(--muted)">YTD Spend</td>${mentioned.map(m => `<td><strong>$${(m.ytdSpend/1000).toFixed(1)}k</strong></td>`).join('')}</tr>
                <tr><td style="color:var(--muted)">Visits</td>${mentioned.map(m => `<td>${m.visits}</td>`).join('')}</tr>
                <tr><td style="color:var(--muted)">Avg Check</td>${mentioned.map(m => `<td>$${m.avgCheck}</td>`).join('')}</tr>
                <tr><td style="color:var(--muted)">Events</td>${mentioned.map(m => `<td>${m.eventsAttended}</td>`).join('')}</tr>
                <tr><td style="color:var(--muted)">Fav Venue</td>${mentioned.map(m => `<td>${m.favVenue}</td>`).join('')}</tr>
                <tr><td style="color:var(--muted)">Sector</td>${mentioned.map(m => `<td style="text-transform:capitalize">${m.sector}</td>`).join('')}</tr>
                <tr><td style="color:var(--muted)">Referrals</td>${mentioned.map(m => `<td>${m.referrals}</td>`).join('')}</tr>
            </table><br>
            <strong>${shared.length} shared interests:</strong> ${shared.join(', ')}`;
    }

    /* ---- Single member profile ---- */
    if (mentioned.length === 1 && (t.includes('profile') || t.includes('show') || t.includes('tell me about') || t.includes('who is') || t.includes('info'))) {
        const m = mentioned[0];
        return `<strong>${m.name}</strong> — ${m.role}<br><br>
            <table class="widget-table">
                <tr><td style="color:var(--muted)">Tier</td><td><strong>${m.tier}</strong></td></tr>
                <tr><td style="color:var(--muted)">YTD Spend</td><td><strong>$${m.ytdSpend.toLocaleString()}</strong></td></tr>
                <tr><td style="color:var(--muted)">Visits</td><td>${m.visits}</td></tr>
                <tr><td style="color:var(--muted)">Avg Check</td><td>$${m.avgCheck}</td></tr>
                <tr><td style="color:var(--muted)">Fav Venue</td><td>${m.favVenue}</td></tr>
                <tr><td style="color:var(--muted)">Go-to Drinks</td><td>${m.favDrink}</td></tr>
                <tr><td style="color:var(--muted)">Companies</td><td>${m.companies.map(c => c.name).join(', ')}</td></tr>
                <tr><td style="color:var(--muted)">Clubs</td><td>${m.clubs.length ? m.clubs.join(', ') : 'None listed'}</td></tr>
                <tr><td style="color:var(--muted)">Events Attended</td><td>${m.eventsAttended}</td></tr>
                <tr><td style="color:var(--muted)">Referrals</td><td>${m.referrals}</td></tr>
                <tr><td style="color:var(--muted)">Miami</td><td>${m.yearsInMiami >= 10 ? 'Born & raised' : m.yearsInMiami + ' years'}</td></tr>
                <tr><td style="color:var(--muted)">Status</td><td>${m.marital}${m.kids === 'Yes' ? ', has kids' : ''}</td></tr>
            </table>`;
    }

    /* ---- Top spenders ---- */
    if (t.includes('top') && (t.includes('spend') || t.includes('spender') || t.includes('money') || t.includes('revenue'))) {
        const sorted = [...MEMBERS].sort((a, b) => b.ytdSpend - a.ytdSpend);
        const top = sorted.slice(0, 5);
        return `<strong>Top 5 Spenders — YTD</strong><br><br>
            <table class="widget-table">
                <tr><th>#</th><th>Member</th><th>YTD Spend</th><th>Visits</th><th>Avg Check</th></tr>
                ${top.map((m, i) => `<tr><td>${i + 1}</td><td><strong>${m.name}</strong></td><td style="color:var(--accent)">$${m.ytdSpend.toLocaleString()}</td><td>${m.visits}</td><td>$${m.avgCheck}</td></tr>`).join('')}
            </table><br>
            <strong>${top[0].name}</strong> leads with $${(top[0].ytdSpend/1000).toFixed(1)}k across ${top[0].visits} visits. They average $${top[0].avgCheck}/check and favor ${top[0].favVenue}.`;
    }

    /* ---- Interest-based queries ---- */
    const interestKeywords = {
        'crypto': ['Crypto'], 'ai': ['AI','Technology'], 'golf': ['Golf'], 'padel': ['Padel','Pickleball','Tennis'],
        'wine': ['Wine','Wine Tasting','Cigars'], 'poker': ['Poker','Game Nights'], 'boat': ['Boating','Yachting'],
        'ski': ['Snow Skiing','Snowboarding'], 'hunt': ['Hunting','Fishing'], 'real estate': ['Real Estate'],
        'art': ['Watches','Art'], 'fitness': ['Fitness','Wellness'], 'invest': ['Investments','Startups'],
        'travel': ['Travel'], 'kite': ['Kite Boarding','Wake Surfing']
    };
    for (const [keyword, interests] of Object.entries(interestKeywords)) {
        if (t.includes(keyword)) {
            const matches = MEMBERS.filter(m => interests.some(i => m.interests.includes(i)));
            return `<strong>${matches.length} members interested in ${interests[0]}</strong><br><br>
                <table class="widget-table">
                    <tr><th>Member</th><th>Role</th><th>YTD Spend</th><th>Would Lead?</th></tr>
                    ${matches.map(m => `<tr>
                        <td><strong>${m.name}</strong></td>
                        <td style="color:var(--muted)">${m.role.split(',')[0]}</td>
                        <td>$${(m.ytdSpend/1000).toFixed(1)}k</td>
                        <td>${m.wouldLead && m.wouldLead.toLowerCase().includes(keyword) ? '<span style="color:var(--green)">Yes</span>' : '—'}</td>
                    </tr>`).join('')}
                </table>`;
        }
    }

    /* ---- Who has kids ---- */
    if (t.includes('kid') || t.includes('children') || t.includes('family') || t.includes('parent')) {
        const withKids = MEMBERS.filter(m => m.kids === 'Yes');
        const planning = MEMBERS.filter(m => m.kids === 'Planning');
        return `<strong>Family Status</strong><br><br>
            <strong>Have kids (${withKids.length}):</strong> ${withKids.map(m => m.name).join(', ')}<br>
            <strong>Planning (${planning.length}):</strong> ${planning.map(m => m.name).join(', ')}<br>
            <strong>No kids:</strong> ${MEMBERS.filter(m => m.kids === 'No').map(m => m.name).join(', ')}<br><br>
            All ${withKids.length} parents are married and among the most active members — ${withKids.map(m => `${m.name.split(' ')[0]} ($${(m.ytdSpend/1000).toFixed(1)}k)`).join(', ')}. Consider family-friendly event options for higher engagement.`;
    }

    /* ---- Finance / sector queries ---- */
    if (t.includes('finance') || t.includes('banking') || t.includes('pe') || t.includes('private equity') || t.includes('wealth')) {
        const fin = MEMBERS.filter(m => m.sector === 'finance');
        return `<strong>Finance Sector Members (${fin.length})</strong><br><br>
            <table class="widget-table">
                <tr><th>Member</th><th>Companies</th><th>YTD Spend</th><th>Visits</th></tr>
                ${fin.map(m => `<tr><td><strong>${m.name}</strong></td><td>${m.companies.map(c => c.name).join(', ')}</td><td>$${(m.ytdSpend/1000).toFixed(1)}k</td><td>${m.visits}</td></tr>`).join('')}
            </table>`;
    }

    /* ---- Founders / CEO ---- */
    if (t.includes('founder') || t.includes('ceo') || t.includes('entrepreneur') || t.includes('owner')) {
        const founders = MEMBERS.filter(m => m.role.toLowerCase().includes('founder') || m.role.toLowerCase().includes('ceo') || m.role.toLowerCase().includes('owner'));
        return `<strong>Founders & CEOs (${founders.length})</strong><br><br>
            <table class="widget-table">
                <tr><th>Member</th><th>Company</th><th>Industry</th><th>YTD Spend</th></tr>
                ${founders.map(m => `<tr><td><strong>${m.name}</strong></td><td>${m.companies[0].name}</td><td>${m.companies[0].industry}</td><td>$${(m.ytdSpend/1000).toFixed(1)}k</td></tr>`).join('')}
            </table><br>
            Combined founder spend: <strong>$${(founders.reduce((s, m) => s + m.ytdSpend, 0)/1000).toFixed(0)}k</strong>. This group represents your highest-value segment.`;
    }

    /* ---- Newest / newest members ---- */
    if (t.includes('new') || t.includes('recent') || t.includes('latest') || t.includes('joined')) {
        const sorted = [...MEMBERS].sort((a, b) => new Date(b.joinDate) - new Date(a.joinDate));
        return `<strong>Members by Join Date</strong><br><br>
            <table class="widget-table">
                <tr><th>Member</th><th>Joined</th><th>Tier</th><th>YTD Spend</th><th>Visits</th></tr>
                ${sorted.map(m => `<tr><td><strong>${m.name}</strong></td><td>${m.joinDate}</td><td>${m.tier}</td><td>$${(m.ytdSpend/1000).toFixed(1)}k</td><td>${m.visits}</td></tr>`).join('')}
            </table><br>
            <strong>${sorted[0].name}</strong> is the newest member (joined ${sorted[0].joinDate}). They've already logged ${sorted[0].visits} visits and $${(sorted[0].ytdSpend/1000).toFixed(1)}k in spend.`;
    }

    /* ---- Seat together / dinner pairing ---- */
    if (t.includes('seat') || t.includes('dinner') || t.includes('pair') || t.includes('table') || t.includes('together') || t.includes('introduce')) {
        const pairs = [];
        for (let i = 0; i < MEMBERS.length; i++) {
            for (let j = i + 1; j < MEMBERS.length; j++) {
                const shared = getSharedInterests([MEMBERS[i], MEMBERS[j]]);
                pairs.push({ a: MEMBERS[i], b: MEMBERS[j], shared: shared.length, interests: shared });
            }
        }
        pairs.sort((a, b) => b.shared - a.shared);
        const top = pairs.slice(0, 5);
        return `<strong>Best Dinner Pairings</strong> (by shared interests)<br><br>
            <table class="widget-table">
                <tr><th>Pair</th><th>Overlap</th><th>Key Shared Interests</th></tr>
                ${top.map(p => `<tr><td><strong>${p.a.name.split(' ')[0]} + ${p.b.name.split(' ')[0]}</strong></td><td style="color:var(--green)">${p.shared}</td><td style="font-size:0.75rem">${p.interests.slice(0, 5).join(', ')}</td></tr>`).join('')}
            </table><br>
            Top pairing: <strong>${top[0].a.name}</strong> and <strong>${top[0].b.name}</strong> share ${top[0].shared} interests. Both are ${top[0].a.marital === top[0].b.marital ? top[0].a.marital.toLowerCase() : 'in different life stages'} — great chemistry potential.`;
    }

    /* ---- Beverage / drink preferences ---- */
    if (t.includes('beverage') || t.includes('drink') || t.includes('wine') || t.includes('cocktail') || t.includes('alcohol') || t.includes('bar')) {
        return `<strong>Member Beverage Preferences</strong><br><br>
            <table class="widget-table">
                <tr><th>Member</th><th>Go-to Drinks</th><th>Fav Venue</th><th>Avg Check</th></tr>
                ${MEMBERS.map(m => `<tr><td><strong>${m.name.split(' ')[0]}</strong></td><td>${m.favDrink}</td><td>${m.favVenue}</td><td>$${m.avgCheck}</td></tr>`).join('')}
            </table><br>
            <strong>Wine preference is dominant</strong> — ${MEMBERS.filter(m => m.interests.includes('Wine Tasting') || m.interests.includes('Wine')).length}/10 members list wine as an interest. Barolo, Brunello, Burgundy, and Opus One are the most-ordered bottles. Strong opportunity for curated wine events.`;
    }

    /* ---- Clubs / memberships ---- */
    if (t.includes('club') || t.includes('membership') || t.includes('soho') || t.includes('member of')) {
        const clubCount = {};
        MEMBERS.forEach(m => m.clubs.forEach(c => { clubCount[c] = (clubCount[c] || 0) + 1; }));
        return `<strong>Club & Membership Overlap</strong><br><br>
            <table class="widget-table">
                <tr><th>Club</th><th>Members</th><th>Who</th></tr>
                ${Object.entries(clubCount).sort((a, b) => b[1] - a[1]).map(([club, count]) => `<tr><td><strong>${club}</strong></td><td>${count}</td><td>${MEMBERS.filter(m => m.clubs.includes(club)).map(m => m.name.split(' ')[0]).join(', ')}</td></tr>`).join('')}
            </table><br>
            <strong>SOHO House</strong> is the most common membership (${clubCount['SOHO House'] || 0} members). The Moore can position as the elevated alternative — more exclusive, curated community over open-membership volume.`;
    }

    /* ---- Events / engagement ---- */
    if (t.includes('event') || t.includes('engagement') || t.includes('attend') || t.includes('active') || t.includes('most active')) {
        const sorted = [...MEMBERS].sort((a, b) => b.eventsAttended - a.eventsAttended);
        return `<strong>Event Engagement Ranking</strong><br><br>
            <table class="widget-table">
                <tr><th>#</th><th>Member</th><th>Events</th><th>Visits</th><th>Referrals</th><th>Last Visit</th></tr>
                ${sorted.map((m, i) => `<tr><td>${i + 1}</td><td><strong>${m.name}</strong></td><td style="color:var(--accent)">${m.eventsAttended}</td><td>${m.visits}</td><td>${m.referrals}</td><td>${m.lastVisit}</td></tr>`).join('')}
            </table><br>
            <strong>${sorted[0].name}</strong> is the most engaged — ${sorted[0].eventsAttended} events, ${sorted[0].visits} visits, ${sorted[0].referrals} referrals. They want: "${sorted[0].eventPriority}"`;
    }

    /* ---- Referrals ---- */
    if (t.includes('referral') || t.includes('refer') || t.includes('brought') || t.includes('invite')) {
        const sorted = [...MEMBERS].sort((a, b) => b.referrals - a.referrals);
        return `<strong>Referral Leaders</strong><br><br>
            <table class="widget-table">
                <tr><th>Member</th><th>Referrals</th><th>Growth Idea</th></tr>
                ${sorted.filter(m => m.referrals > 0).map(m => `<tr><td><strong>${m.name}</strong></td><td style="color:var(--green)">${m.referrals}</td><td style="font-size:0.75rem">${m.growthIdea || '—'}</td></tr>`).join('')}
            </table><br>
            Total referrals: <strong>${MEMBERS.reduce((s, m) => s + m.referrals, 0)}</strong>. Consensus is clear: keep the community tight and referral-only.`;
    }

    /* ---- Single member mentioned but no specific query type ---- */
    if (mentioned.length === 1) {
        const m = mentioned[0];
        return `<strong>${m.name}</strong><br><br>
            ${m.role} &middot; ${m.tier} Member &middot; ${m.marital}<br>
            <strong>$${m.ytdSpend.toLocaleString()}</strong> YTD across <strong>${m.visits}</strong> visits (avg $${m.avgCheck}/check)<br>
            Favorites: ${m.favVenue}, ${m.favDrink}<br>
            Companies: ${m.companies.map(c => c.name).join(', ')}<br>
            Interests: ${m.interests.slice(0, 8).join(', ')}${m.interests.length > 8 ? '...' : ''}<br><br>
            What would you like to know about ${m.name.split(' ')[0]}? Try "compare ${m.name.split(' ')[0]} and [another member]" or ask about their spend, interests, or preferences.`;
    }

    /* ---- Overlap / shared interests ---- */
    if (t.includes('overlap') || t.includes('common') || t.includes('shared') || t.includes('share')) {
        const interestCount = {};
        MEMBERS.forEach(m => m.interests.forEach(i => { interestCount[i] = (interestCount[i] || 0) + 1; }));
        const universal = Object.entries(interestCount).filter(([, c]) => c >= 8).sort((a, b) => b[1] - a[1]);
        const niche = Object.entries(interestCount).filter(([, c]) => c <= 3).sort((a, b) => a[1] - b[1]);
        return `<strong>Interest Overlap Analysis</strong><br><br>
            <strong>Near-universal (8+ members):</strong><br>${universal.map(([i, c]) => `&bull; ${i} (${c}/10)`).join('<br>')}<br><br>
            <strong>Niche (1-3 members):</strong><br>${niche.slice(0, 8).map(([i, c]) => `&bull; ${i} (${c}/10) — ${MEMBERS.filter(m => m.interests.includes(i)).map(m => m.name.split(' ')[0]).join(', ')}`).join('<br>')}<br><br>
            <strong>Takeaway:</strong> Padel, dining, and travel are table stakes. To create memorable member-only experiences, lean into niche interests: wine + cigars dinners, spearfishing trips, art collecting events.`;
    }

    /* ---- Fallback: general summary ---- */
    if (t.includes('summary') || t.includes('overview') || t.includes('report') || t.includes('all')) {
        const totalSpend = MEMBERS.reduce((s, m) => s + m.ytdSpend, 0);
        return `<strong>Member Intelligence Summary</strong><br><br>
            <strong>10 members</strong> &middot; $${(totalSpend/1000).toFixed(0)}k total YTD spend &middot; ${MEMBERS.reduce((s, m) => s + m.visits, 0)} total visits<br><br>
            <strong>Top spender:</strong> ${[...MEMBERS].sort((a, b) => b.ytdSpend - a.ytdSpend)[0].name} ($${([...MEMBERS].sort((a, b) => b.ytdSpend - a.ytdSpend)[0].ytdSpend/1000).toFixed(1)}k)<br>
            <strong>Most active:</strong> ${[...MEMBERS].sort((a, b) => b.visits - a.visits)[0].name} (${[...MEMBERS].sort((a, b) => b.visits - a.visits)[0].visits} visits)<br>
            <strong>Top referrer:</strong> ${[...MEMBERS].sort((a, b) => b.referrals - a.referrals)[0].name} (${[...MEMBERS].sort((a, b) => b.referrals - a.referrals)[0].referrals} referrals)<br>
            <strong>Sectors:</strong> Tech (4), Finance (3), Founders (2), Other (1)<br>
            <strong>Consensus:</strong> Keep community tight, referral-only, high-quality events`;
    }

    /* ---- True fallback ---- */
    return `I can answer questions about any of the <strong>10 members</strong>. Try:<br><br>
        &bull; <strong>By name:</strong> "Tell me about ${MEMBERS[Math.floor(Math.random() * MEMBERS.length)].name}"<br>
        &bull; <strong>Compare:</strong> "Compare Nat and Austin"<br>
        &bull; <strong>By interest:</strong> "Who's into crypto?" / "Wine lovers" / "Golf members"<br>
        &bull; <strong>By data:</strong> "Top spenders" / "Most active" / "Newest members"<br>
        &bull; <strong>Strategic:</strong> "Who should I seat together?" / "Referral leaders" / "Club overlap"<br>
        &bull; <strong>Family:</strong> "Who has kids?" / "Single members"<br>
        &bull; <strong>Sector:</strong> "Finance members" / "Founders and CEOs"`;
}

function getSharedInterests(members) {
    const sets = members.map(m => new Set(m.interests));
    return [...sets[0]].filter(i => sets.every(s => s.has(i)));
}

/* ================================================================
   INIT
   ================================================================ */
renderMemberList(MEMBERS);
renderProfile();
</script>
</body>
</html>
