<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Keenon S100 — flat platform AMR with tall mast + screen -->
  <!-- Base/wheels -->
  <rect x="10" y="52" width="36" height="8" rx="4" fill="#e8ecf0"/>
  <rect x="10" y="52" width="36" height="8" rx="4" stroke="#b0b8c4" stroke-width="0.5" fill="url(#s100base)"/>
  <!-- Wheels -->
  <circle cx="40" cy="60" r="3" fill="#1e293b"/>
  <circle cx="40" cy="60" r="1.5" fill="#374151"/>
  <circle cx="16" cy="60" r="2" fill="#1e293b"/>
  <!-- Cyan LED strip -->
  <rect x="12" y="51" width="32" height="2" rx="1" fill="#22d3ee" opacity="0.7"/>
  <!-- KEENON label -->
  <rect x="12" y="54" width="20" height="4" rx="1" fill="#1e293b"/>
  <!-- S100 label -->
  <text x="41" y="57" fill="#64748b" font-size="4" font-weight="700" font-family="sans-serif">S100</text>
  <!-- Platform top -->
  <rect x="8" y="44" width="40" height="8" rx="3" fill="#c8d0d8"/>
  <rect x="8" y="44" width="40" height="8" rx="3" stroke="#a0a8b4" stroke-width="0.5" fill="url(#s100plat)"/>
  <!-- Platform dots -->
  <circle cx="18" cy="48" r="0.8" fill="#94a3b8"/>
  <circle cx="22" cy="48" r="0.8" fill="#94a3b8"/>
  <circle cx="26" cy="48" r="0.8" fill="#94a3b8"/>
  <circle cx="30" cy="48" r="0.8" fill="#94a3b8"/>
  <circle cx="34" cy="48" r="0.8" fill="#94a3b8"/>
  <!-- Mast/pole -->
  <rect x="16" y="10" width="5" height="34" rx="2.5" fill="#64748b"/>
  <rect x="16" y="10" width="5" height="34" rx="2.5" fill="url(#s100mast)" stroke="#475569" stroke-width="0.3"/>
  <!-- Emergency button -->
  <circle cx="18.5" cy="36" r="2" fill="#ef4444"/>
  <circle cx="18.5" cy="36" r="1.2" fill="#dc2626"/>
  <!-- Screen at top -->
  <rect x="10" y="4" width="22" height="14" rx="3" fill="#e0e4e8" stroke="#94a3b8" stroke-width="0.5"/>
  <rect x="12" y="6" width="18" height="10" rx="2" fill="#1e293b"/>
  <!-- Screen content -->
  <rect x="13" y="7" width="8" height="4" rx="1" fill="#3b82f6" opacity="0.7"/>
  <rect x="22" y="7" width="7" height="4" rx="1" fill="#22d3ee" opacity="0.6"/>
  <rect x="13" y="12" width="5" height="3" rx="1" fill="#10b981" opacity="0.5"/>
  <rect x="19" y="12" width="5" height="3" rx="1" fill="#64748b" opacity="0.4"/>
  <rect x="25" y="12" width="4" height="3" rx="1" fill="#8b5cf6" opacity="0.4"/>
  <defs>
    <linearGradient id="s100base" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0e4e8"/><stop offset="50%" stop-color="#f0f4f8"/><stop offset="100%" stop-color="#d8dce0"/>
    </linearGradient>
    <linearGradient id="s100plat" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#d0d8e0"/><stop offset="50%" stop-color="#e8ecf0"/><stop offset="100%" stop-color="#c0c8d0"/>
    </linearGradient>
    <linearGradient id="s100mast" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#64748b"/><stop offset="40%" stop-color="#94a3b8"/><stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
  </defs>
</svg>
