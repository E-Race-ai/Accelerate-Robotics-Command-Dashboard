<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elevator Shaft Cross-Section</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    /* LoRa signal animation */
    @keyframes lora-signal { 0% { r: 4; opacity: 0.8; } 100% { r: 20; opacity: 0; } }
    .lora-wave { animation: lora-signal 2s ease-out infinite; }
    .lora-wave-2 { animation: lora-signal 2s ease-out infinite 0.7s; }
    /* LED blink */
    @keyframes led-blink { 0%,85% { opacity: 1; } 90% { opacity: 0.3; } 100% { opacity: 1; } }
    .led-active { animation: led-blink 2s ease-in-out infinite; }
    /* WHY: Initial positions set by JS via style.transform to animate cabin */
    #cabin-label-2, #cabin-label-4 { transition: opacity 0.3s ease; }
</style>
</head>

        <text x="620" y="622" text-anchor="middle" fill="white" font-size="10" font-weight="900">4</text>
        <text x="638" y="616" fill="#4ade80" font-size="10" font-weight="700">RFID Reader on cabin</text>
        <text x="638" y="628" fill="#94a3b8" font-size="9">Reads tags as cabin moves</text>

    <!-- M2 Cleaning Robot riding inside the elevator cabin -->
    <g id="cabin-robot">
        <image href="/assets/robots/keenon-m2.svg" x="330" y="620" width="60" height="60"/>

    <!-- Robot Queue at lobby (bottom-right) — 3 bots waiting for the elevator -->
    <g id="robot-queue">
        <!-- Queue label -->
        <text x="640" y="900" text-anchor="middle" fill="#64748b" font-size="8" font-weight="600">Waiting for elevator</text>
        <!-- Bot 1 (closest to elevator) — W3 Delivery -->
        <image href="/assets/robots/keenon-w3.svg" x="556" y="908" width="48" height="48"/>

        <!-- Bot 2 — S100 Transport -->
        <image href="/assets/robots/keenon-s100.svg" x="616" y="908" width="48" height="48"/>
        <text x="640" y="966" text-anchor="middle" fill="#94a3b8" font-size="7" font-weight="600">S100</text>
        <!-- Bot 3 (furthest) — N5 Cleaning -->
        <image href="/assets/robots/keenon-n5.svg" x="676" y="908" width="48" height="48"/>

        <path d="M556,930 Q530,900 505,860" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4"/>

    <!-- Floor Indicator Display -->
    <g id="floor-display" transform="translate(620, 240)">
        <rect width="130" height="90" rx="12" fill="rgba(15,23,42,0.5)" stroke="rgba(100,180,255,0.15)" stroke-width="1"/>
        <rect x="4" y="4" width="122" height="82" rx="10" fill="rgba(15,23,42,0.3)"/>
        <text x="65" y="24" text-anchor="middle" fill="#94a3b8" font-size="8" font-weight="600" font-family="'Space Grotesk', sans-serif">CURRENT FLOOR</text>

<script>
(function(){
    var floors = ['L','2','3','4','5','6','7','8','9','10'];
    var cabin = document.getElementById('elevator-cabin');
    var cabinRobot = document.getElementById('cabin-robot');
    var label2 = document.getElementById('cabin-label-2');
    var label4 = document.getElementById('cabin-label-4');
    var floorNum = document.getElementById('floor-number');
    var floorStatus = document.getElementById('floor-status');

    /* WHY: Map each floor index to its Y position in SVG coords (from the floor lines).
       The cabin translateY is computed from these so it always lands exactly on the floor line. */
    var floorY = [840, 780, 720, 640, 560, 480, 400, 320, 240, 160];
    /* Cabin group's native center Y: rect at y=598, height=84, center = 640 */
    var cabinCenterNative = 640;

    var currentFloor = 0, targetFloor = 0;
    var currentTY = floorY[0] - cabinCenterNative; /* 200 — translateY to put cabin at lobby */
    var targetTY = currentTY;
    var state = 'idle', timer = 0;

    function setFloor(f) {
        targetFloor = f;
        targetTY = floorY[f] - cabinCenterNative;
        state = 'moving';
        floorStatus.textContent = f > currentFloor ? 'MOVING ▲' : 'MOVING ▼';
    }

    function applyTransform(ty) {
        cabin.style.transform = 'translateY(' + ty + 'px)';
        cabinRobot.style.transform = 'translateY(' + ty + 'px)';
        label2.style.transform = 'translateY(' + ty + 'px)';
        label4.style.transform = 'translateY(' + ty + 'px)';
    }

    function animate() {
        if (state === 'idle') {
            timer++;
            if (timer > 120) {
                timer = 0;
                var next;
                do { next = Math.floor(Math.random() * floors.length); } while (next === currentFloor);
                setFloor(next);
            }
        } else if (state === 'moving') {
            var diff = targetTY - currentTY;
            if (Math.abs(diff) < 1) {
                currentTY = targetTY;
                currentFloor = targetFloor;
                state = 'stopped';
                timer = 0;
                floorNum.textContent = floors[currentFloor];
                floorStatus.textContent = 'STOPPED';
            } else {
                currentTY += diff * 0.03;
                /* Find nearest floor for display */
                var best = 0, bestD = Infinity;
                for (var i = 0; i < floorY.length; i++) {
                    var d = Math.abs(currentTY - (floorY[i] - cabinCenterNative));
                    if (d < bestD) { bestD = d; best = i; }
                }
                floorNum.textContent = floors[best];
            }
            applyTransform(currentTY);
        } else if (state === 'stopped') {
            timer++;
            if (timer > 90) { timer = 0; state = 'idle'; }
        }
        requestAnimationFrame(animate);
    }

    applyTransform(currentTY);
    floorNum.textContent = 'L';
    animate();
})();
</script>
