<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Accelerate Robotics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/brand.css">
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    h1, h2, .headline { font-family: 'Space Grotesk', 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-[#f7f8fc] min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4"
           style="background:linear-gradient(135deg, var(--blue), var(--cyan));box-shadow:0 4px 14px rgba(0,85,255,0.25);">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M13 3L4 14h7l-1 7 9-11h-7l1-7z" fill="white" stroke="white" stroke-width="1.5"/></svg>
      </div>
      <h1 class="text-2xl font-bold headline">Forgot Password</h1>
      <p class="text-gray-400 text-sm mt-1">We'll email you a reset link</p>
    </div>

    <form id="forgotForm" class="bg-white rounded-2xl shadow-lg p-8 space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" name="email" required autocomplete="email"
               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
      </div>
      <button type="submit"
              class="brand-btn-primary w-full py-3 font-semibold rounded-xl transition"
              style="font-size:0.95rem;">
        Send Reset Link
      </button>
      <p id="forgotError" class="text-red-600 text-sm font-medium text-center hidden"></p>
    </form>

    <div id="sentState" class="bg-white rounded-2xl shadow-lg p-8 text-center hidden">
      <div class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-4">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2 class="text-lg font-semibold text-gray-900 mb-2">Check your email</h2>
      <p class="text-sm text-gray-500 mb-5">If an account exists for the email you entered, we've sent a reset link that's good for one hour.</p>
      <a href="/admin-login" class="text-sm text-blue-600 hover:underline font-medium">&larr; Back to sign in</a>
    </div>

    <p class="text-center mt-6">
      <a href="/admin-login" class="text-sm text-gray-400 hover:text-blue-600 transition">&larr; Back to sign in</a>
    </p>
  </div>

  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('forgotError');
      errEl.classList.add('hidden');

      const form = e.target;
      const btn = form.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        // WHY: Endpoint always returns 200 (no enumeration), so we show the
        // "check your email" state regardless of whether the account exists.
        await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: form.email.value }),
        });
        document.getElementById('forgotForm').classList.add('hidden');
        document.getElementById('sentState').classList.remove('hidden');
      } catch {
        errEl.textContent = 'Network error. Please try again.';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>
