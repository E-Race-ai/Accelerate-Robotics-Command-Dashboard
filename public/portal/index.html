<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Portal · Accelerate Robotics</title>
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; line-height: 1.5; color: #1A1A1A; background: #F5F7FA; -webkit-font-smoothing: antialiased; }
:root { --portal-primary: #1F4E79; --portal-accent: #2E86C1; }
a { color: inherit; }
.portal-header { background: var(--portal-primary); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; color: #fff; }
.portal-header .left { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
.portal-header .customer-logo { background: #fff; border-radius: 6px; padding: 6px 14px; font-weight: 700; color: var(--portal-primary); font-size: 14px; height: 36px; display: inline-flex; align-items: center; }
.portal-header .customer-logo img { max-height: 28px; max-width: 180px; }
.portal-header .partnered { font-size: 11px; opacity: 0.7; }
.portal-header .accelerate-mark { font-size: 13px; font-weight: 600; opacity: 0.9; }
.portal-header .user-menu { display: flex; align-items: center; gap: 14px; font-size: 12px; }
.portal-header .user-menu .email { opacity: 0.85; }
.portal-header .user-menu a { color: rgba(255,255,255,0.85); text-decoration: none; cursor: pointer; }
.portal-tabs { background: #fff; border-bottom: 1px solid #E5E7EB; padding: 0 32px; display: flex; gap: 4px; overflow-x: auto; }
.portal-tabs button { background: none; border: 0; padding: 14px 18px; font-size: 13px; font-weight: 500; color: #6B7280; cursor: pointer; border-bottom: 2px solid transparent; font-family: inherit; }
.portal-tabs button.active { color: var(--portal-primary); border-bottom-color: var(--portal-primary); }
.portal-content { max-width: 1100px; margin: 0 auto; padding: 28px 32px 80px; }
.welcome-block { background: #fff; border: 1px solid #E5E7EB; border-radius: 10px; padding: 24px 28px; margin-bottom: 22px; border-left: 4px solid var(--portal-primary); }
.welcome-block h2 { margin: 0 0 10px; font-size: 20px; color: #0A1628; }
.welcome-block p { margin: 0; color: #4B5563; line-height: 1.6; white-space: pre-wrap; }
.toolbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.btn { background: #fff; border: 1px solid #D1D5DB; border-radius: 6px; padding: 8px 14px; font-size: 13px; font-weight: 500; cursor: pointer; color: #374151; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; font-family: inherit; }
.btn:hover { background: #F9FAFB; }
.btn-primary { background: var(--portal-primary); border-color: var(--portal-primary); color: #fff; }
.btn-primary:hover { opacity: 0.9; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-ghost { background: transparent; border-color: transparent; }
.btn-ghost:hover { background: #F3F4F6; }
.file-list { background: #fff; border: 1px solid #E5E7EB; border-radius: 8px; overflow: hidden; }
.file-row { display: grid; grid-template-columns: 32px 1fr auto; gap: 14px; padding: 14px 18px; border-bottom: 1px solid #F3F4F6; align-items: center; cursor: pointer; }
.file-row:last-child { border-bottom: none; }
.file-row:hover { background: #F9FAFB; }
.file-row .ic { font-size: 22px; }
.file-row .info .name { font-weight: 500; font-size: 14px; color: #0A1628; }
.file-row .info .name .pin { color: #D97706; font-size: 11px; margin-left: 6px; }
.file-row .info .meta { font-size: 11px; color: #6B7280; margin-top: 2px; }
.file-row .info .desc { font-size: 12px; color: #4B5563; margin-top: 4px; }
.file-row .pubsource { display: inline-block; background: #EDE9FE; color: #5B21B6; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; margin-top: 4px; }
.empty { text-align: center; padding: 60px 20px; color: #6B7280; background: #fff; border: 1px solid #E5E7EB; border-radius: 8px; }
.empty .ic { font-size: 32px; margin-bottom: 8px; }
.tbl { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #E5E7EB; border-radius: 8px; overflow: hidden; }
.tbl th { background: #F9FAFB; text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 600; text-transform: uppercase; color: #6B7280; border-bottom: 1px solid #E5E7EB; }
.tbl td { padding: 12px 14px; border-bottom: 1px solid #F3F4F6; font-size: 13px; }
.tbl tr:last-child td { border-bottom: none; }
.muted { color: #6B7280; }
.pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
.pill.internal { background: #EDE9FE; color: #5B21B6; }
.pill.external { background: #DBEAFE; color: #1E40AF; }
.timeline { position: relative; padding-left: 24px; }
.timeline::before { content: ''; position: absolute; left: 7px; top: 8px; bottom: 8px; width: 2px; background: #E5E7EB; }
.ti { position: relative; padding-bottom: 14px; }
.ti::before { content: ''; position: absolute; left: -22px; top: 5px; width: 12px; height: 12px; border-radius: 50%; background: var(--portal-primary); border: 2px solid #fff; }
.ti.upload::before { background: #059669; }
.ti.view::before { background: #6B7280; }
.ti.comment::before { background: #D97706; }
.ti .text { font-size: 13px; }
.ti .when { font-size: 11px; color: #9CA3AF; margin-top: 2px; }
.drawer-bd { position: fixed; inset: 0; background: rgba(10,22,40,0.4); z-index: 90; display: none; }
.drawer { position: fixed; right: 0; top: 0; bottom: 0; width: 480px; max-width: 100%; background: #fff; z-index: 100; box-shadow: -4px 0 20px rgba(0,0,0,0.12); display: none; flex-direction: column; }
.drawer.open, .drawer-bd.open { display: flex; }
.drawer .head { padding: 18px 22px; border-bottom: 1px solid #E5E7EB; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.drawer .head h3 { margin: 0; font-size: 15px; color: #0A1628; line-height: 1.3; }
.drawer .head .meta { font-size: 11px; color: #6B7280; margin-top: 4px; }
.drawer .body { flex: 1; overflow-y: auto; padding: 18px 22px; }
.drawer .preview { background: #F3F4F6; border-radius: 8px; padding: 40px 20px; text-align: center; margin-bottom: 16px; color: #6B7280; }
.drawer .preview .ic { font-size: 48px; margin-bottom: 8px; }
.comment { background: #F9FAFB; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
.comment .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.comment .author { font-weight: 600; font-size: 12px; color: #0A1628; }
.comment .when { font-size: 11px; color: #9CA3AF; }
.comment .body { font-size: 13px; color: #1A1A1A; line-height: 1.5; }
.comment-form textarea { width: 100%; border: 1px solid #D1D5DB; border-radius: 6px; padding: 8px 12px; font-family: inherit; font-size: 13px; resize: vertical; min-height: 70px; }
.portal-footer { text-align: center; padding: 24px; color: #9CA3AF; font-size: 11px; border-top: 1px solid #E5E7EB; margin-top: 40px; }
.flex { display: flex; }
.gap-8 { gap: 8px; }
.toast { position: fixed; bottom: 20px; right: 20px; background: var(--portal-primary); color: #fff; padding: 12px 16px; border-radius: 6px; font-size: 13px; box-shadow: 0 4px 14px rgba(0,0,0,0.15); z-index: 200; }
.toast.error { background: #B91C1C; }
.loading-state { padding: 80px 20px; text-align: center; color: #6B7280; }
</style>
</head>
<body>

<div id="root"><div class="loading-state">⏳ Loading…</div></div>

<div class="drawer-bd" id="drawer-bd" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"></div>

<script>
'use strict';

const slug = location.pathname.match(/\/portal\/([^\/]+)/)?.[1];
let state = { portal: null, me: null, content: [], activity: [], participants: [], activeTab: 'content' };

const $ = (s) => document.querySelector(s);
function escape(s) { return (s||'').toString().replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmtBytes(b) { if (!b) return '—'; if (b<1024) return b+' B'; if (b<1048576) return (b/1024).toFixed(1)+' KB'; if (b<1073741824) return (b/1048576).toFixed(1)+' MB'; return (b/1073741824).toFixed(2)+' GB'; }
function ago(iso) {
  if (!iso) return '—';
  const d = new Date(iso.replace(' ', 'T') + (iso.endsWith('Z') ? '' : 'Z'));
  const diff = Date.now() - d.getTime();
  const m = Math.floor(diff/60000), h = Math.floor(diff/3600000), days = Math.floor(diff/86400000);
  if (days > 30) return Math.floor(days/30) + 'mo ago';
  if (days > 0) return days + 'd ago';
  if (h > 0) return h + 'h ago';
  if (m > 0) return m + 'm ago';
  return 'just now';
}
function fileIcon(mime) {
  if (!mime) return '📄'; if (mime.startsWith('image/')) return '🖼';
  if (mime.startsWith('video/')) return '🎬'; if (mime.includes('pdf')) return '📕';
  if (mime.includes('sheet') || mime.includes('excel')) return '📊';
  if (mime.includes('word') || mime.includes('document')) return '📝';
  return '📄';
}
function eventLabel(t) {
  return ({
    'portal.viewed':'visited the portal','participant.accepted':'joined the portal',
    'participant.signed_in':'signed in','content.uploaded':'uploaded',
    'content.viewed':'viewed','content.downloaded':'downloaded',
    'comment.posted':'commented on','comment.replied':'replied on',
  }[t] || t);
}
function toast(msg, err) {
  const el = document.createElement('div');
  el.className = 'toast' + (err ? ' error' : '');
  el.textContent = msg; document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

async function api(path, opts = {}) {
  const isForm = opts.body instanceof FormData;
  const res = await fetch(`/api/portal-public/${encodeURIComponent(slug)}${path}`, {
    credentials: 'include',
    headers: isForm ? (opts.headers || {}) : { 'Content-Type': 'application/json', ...(opts.headers || {}) },
    ...opts,
  });
  if (res.status === 401) {
    location.href = `/portal/${encodeURIComponent(slug)}/sign-in.html`;
    throw new Error('Not signed in');
  }
  if (!res.ok) {
    const text = await res.text();
    let msg; try { msg = JSON.parse(text).error; } catch (_) { msg = text; }
    throw new Error(msg || `HTTP ${res.status}`);
  }
  return res.json();
}

async function loadAll() {
  try {
    const [meRes, contentRes, participantsRes, activityRes] = await Promise.all([
      api(''),
      api('/content'),
      api('/participants'),
      api('/activity'),
    ]);
    state.portal = meRes.portal;
    state.me = meRes.me;
    state.content = contentRes.content;
    state.participants = participantsRes.participants;
    state.activity = activityRes.events;
    document.documentElement.style.setProperty('--portal-primary', state.portal.theme.primary_color);
    document.documentElement.style.setProperty('--portal-accent', state.portal.theme.accent_color);
    render();
  } catch (err) {
    if (err.message === 'Not signed in') return;
    $('#root').innerHTML = `<div class="loading-state">⚠️ ${escape(err.message)}</div>`;
  }
}

function render() {
  const p = state.portal;
  // WHY: Guard the img URL on `slug` being defined. The slug regex at the top
  // of this file returns undefined when the page is served outside /portal/<slug>/
  // (e.g. preview panes); without this guard the img src becomes
  // "/api/portal-public/undefined/logo" which the browser treats as a load error.
  const logoHtml = (slug && p.customer_logo_path)
    ? `<span class="customer-logo"><img src="/api/portal-public/${encodeURIComponent(slug)}/logo" alt="${escape(p.customer_name)}"></span>`
    : `<span class="customer-logo">${escape(p.customer_name)}</span>`;

  $('#root').innerHTML = `
    <div class="portal-header">
      <div class="left">
        ${logoHtml}
        <span class="partnered">in partnership with</span>
        <span class="accelerate-mark">Accelerate Robotics</span>
      </div>
      <div class="user-menu">
        <span class="email">${escape(state.me.email)}</span>
        <a onclick="signOut()">Sign out</a>
      </div>
    </div>
    <div class="portal-tabs">
      <button class="${state.activeTab==='content'?'active':''}" onclick="setTab('content')">Files</button>
      <button class="${state.activeTab==='activity'?'active':''}" onclick="setTab('activity')">Recent activity</button>
      ${(p.allow_external_invites || state.me.role === 'internal') ? `<button class="${state.activeTab==='team'?'active':''}" onclick="setTab('team')">Team</button>` : ''}
    </div>
    <div class="portal-content" id="content"></div>
    <div class="portal-footer">Powered by Accelerate Robotics · Private space for ${escape(p.customer_name)}</div>
  `;
  renderTab();
}

function setTab(t) { state.activeTab = t; render(); }

function renderTab() {
  const el = $('#content'); if (!el) return;
  if (state.activeTab === 'content') el.innerHTML = renderFiles();
  else if (state.activeTab === 'activity') el.innerHTML = renderActivity();
  else if (state.activeTab === 'team') el.innerHTML = renderTeam();
}

function renderFiles() {
  const p = state.portal;
  const folders = state.content.filter(c => c.kind === 'folder');
  const root = state.content.filter(c => !c.parent_folder_id).sort((a,b) => (b.is_pinned-a.is_pinned) || a.sort_order-b.sort_order);
  const canUpload = p.allow_external_uploads || state.me.role === 'internal';
  let html = '';
  if (p.welcome_message) html += `<div class="welcome-block"><h2>Welcome, ${escape(p.customer_name)}</h2><p>${escape(p.welcome_message)}</p></div>`;
  html += `<div class="toolbar"><div></div><div>${canUpload ? `<label class="btn btn-primary" style="cursor:pointer;">+ Upload file<input type="file" style="display:none;" onchange="uploadFile(event)"></label>` : ''}</div></div>`;
  html += `<div class="file-list">${root.length === 0 ? `<div class="empty"><div class="ic">📁</div><div>No files yet</div></div>` : root.map(c => fileRow(c)).join('')}</div>`;
  folders.forEach(f => {
    const inside = state.content.filter(c => c.parent_folder_id === f.id);
    if (!inside.length) return;
    html += `<div style="margin-top:24px;"><div style="font-size:14px;font-weight:600;color:#374151;margin-bottom:8px;">📁 ${escape(f.title)}</div><div class="file-list">${inside.sort((a,b)=>b.is_pinned-a.is_pinned).map(c=>fileRow(c)).join('')}</div></div>`;
  });
  return html;
}

function fileRow(c) {
  if (c.kind === 'folder') {
    const inside = state.content.filter(x => x.parent_folder_id === c.id).length;
    return `<div class="file-row"><div class="ic">📁</div><div class="info"><div class="name">${escape(c.title)}</div><div class="meta">${inside} item${inside!==1?'s':''}</div></div><div></div></div>`;
  }
  return `<div class="file-row" onclick="openFile('${c.id}')"><div class="ic">${fileIcon(c.file_type)}</div><div class="info"><div class="name">${escape(c.title)} ${c.is_pinned?'<span class="pin">📌</span>':''}</div><div class="meta">${fmtBytes(c.file_size_bytes)} · ${ago(c.created_at)}</div>${c.description?`<div class="desc">${escape(c.description)}</div>`:''}${c.source_tool?`<div><span class="pubsource">${escape(c.source_tool.replace('_',' '))}</span></div>`:''}</div><div></div></div>`;
}

function renderActivity() {
  const events = state.activity || [];
  if (!events.length) return `<div class="empty"><div class="ic">📊</div><div>No activity yet</div></div>`;
  return `<div style="background:#fff;border:1px solid #E5E7EB;border-radius:8px;padding:20px 22px;"><div class="timeline">${events.map(e => {
    const cls = e.event_type.startsWith('content.upload') ? 'upload' : e.event_type.startsWith('content.view') ? 'view' : e.event_type.startsWith('comment') ? 'comment' : '';
    let target = '';
    if (e.target_id) {
      const it = state.content.find(c => c.id === e.target_id);
      if (it) target = ` <strong>${escape(it.title)}</strong>`;
    }
    return `<div class="ti ${cls}"><div class="text"><strong>${escape(e.participant_email||'system')}</strong> ${eventLabel(e.event_type)}${target}</div><div class="when">${ago(e.occurred_at)}</div></div>`;
  }).join('')}</div></div>`;
}

function renderTeam() {
  const p = state.portal;
  const canInvite = p.allow_external_invites || state.me.role === 'internal';
  return `${canInvite ? `<div class="toolbar"><div></div><div><button class="btn btn-primary" onclick="inviteColleague()">+ Invite colleague</button></div></div>` : ''}
  <table class="tbl"><thead><tr><th>Name / email</th><th>Role</th><th>Last seen</th></tr></thead><tbody>
    ${state.participants.map(x => `<tr><td><div style="font-weight:600;">${escape(x.full_name||x.email)}</div><div class="muted">${escape(x.email)}</div></td><td><span class="pill ${x.role}">${x.role === 'internal' ? 'Accelerate' : escape(p.customer_name)}</span></td><td class="muted">${ago(x.last_seen_at)}</td></tr>`).join('')}
  </tbody></table>`;
}

async function openFile(id) {
  const item = state.content.find(c => c.id === id);
  if (!item) return;
  api(`/content/${id}/view`, { method: 'POST' }).catch(() => {});
  let comments = { comments: [] };
  try { comments = await api(`/content/${id}/comments`); } catch (_) {}
  const drawer = $('#drawer');
  drawer.innerHTML = `
    <div class="head">
      <div><h3>${escape(item.title)}</h3><div class="meta">${fmtBytes(item.file_size_bytes)} · uploaded ${ago(item.created_at)}</div></div>
      <button class="btn btn-sm btn-ghost" onclick="closeDrawer()">×</button>
    </div>
    <div class="body">
      <div class="preview"><div class="ic">${fileIcon(item.file_type)}</div><div>File preview</div><div style="font-size:11px;margin-top:6px;">Click download to view in your browser</div></div>
      ${item.description ? `<div style="background:#F9FAFB;border-radius:6px;padding:10px 12px;margin-bottom:14px;font-size:13px;">${escape(item.description)}</div>` : ''}
      ${state.portal.allow_external_downloads ? `<div class="flex gap-8" style="margin-bottom:16px;"><a class="btn btn-sm" href="/api/portal-public/${encodeURIComponent(slug)}/content/${id}/file" target="_blank" onclick="trackDownload('${id}')">⬇ Download</a></div>` : ''}
      <h4 style="margin:0 0 10px;font-size:13px;font-weight:600;">Comments (${comments.comments?.length||0})</h4>
      <div id="comments-list">${(comments.comments||[]).map(c => `<div class="comment"><div class="head"><span class="author">${escape(c.author_email)}</span><span class="when">${ago(c.created_at)}</span></div><div class="body">${escape(c.body)}</div></div>`).join('') || '<div class="muted" style="font-size:12px;">No comments yet — be the first to ask a question.</div>'}</div>
      <div class="comment-form" style="margin-top:14px;">
        <textarea id="new-comment" placeholder="Ask a question or leave a comment..."></textarea>
        <button class="btn btn-primary btn-sm" style="margin-top:8px;" onclick="postComment('${id}')">Post comment</button>
      </div>
    </div>
  `;
  drawer.classList.add('open');
  $('#drawer-bd').classList.add('open');
}

function closeDrawer() { $('#drawer').classList.remove('open'); $('#drawer-bd').classList.remove('open'); }

async function postComment(itemId) {
  const body = $('#new-comment').value.trim();
  if (!body) return;
  try {
    await api(`/content/${itemId}/comments`, { method: 'POST', body: JSON.stringify({ body }) });
    openFile(itemId); // reload drawer with new comment
    // Reload activity in background
    api('/activity').then(r => { state.activity = r.events; if (state.activeTab === 'activity') renderTab(); });
  } catch (err) { toast(err.message, true); }
}

function trackDownload(_id) { /* handled server-side; download link goes through tracked endpoint */ }

async function uploadFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const fd = new FormData(); fd.append('file', file); fd.append('title', file.name);
  try {
    await api('/content', { method: 'POST', body: fd });
    toast('Uploaded');
    loadAll();
  } catch (err) { toast(err.message, true); }
  finally { e.target.value = ''; }
}

async function inviteColleague() {
  const email = prompt('Email of the colleague to invite:');
  if (!email || !email.includes('@')) return;
  try { await api('/participants', { method: 'POST', body: JSON.stringify({ email }) }); toast('Invite sent'); loadAll(); }
  catch (err) { toast(err.message, true); }
}

async function signOut() {
  try { await api('/sign-out', { method: 'POST' }); } catch (_) {}
  location.href = `/portal/${encodeURIComponent(slug)}/sign-in.html`;
}

loadAll();
</script>

</body>
</html>
