<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in to portal · Accelerate Robotics</title>
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; line-height: 1.5; color: #1A1A1A; background: linear-gradient(135deg, #0A1628 0%, #1F4E79 100%); display: flex; align-items: center; justify-content: center; padding: 20px; min-height: 100vh; }
.card { background: #fff; border-radius: 12px; max-width: 440px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.25); overflow: hidden; }
.card .header { background: #fff; padding: 28px 32px 0; }
.card .accelerate-mark { font-size: 12px; color: #6B7280; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 600; margin-bottom: 18px; }
.card h1 { margin: 0 0 8px; font-size: 22px; color: #0A1628; font-weight: 700; }
.card .sub { margin: 0; color: #6B7280; font-size: 13px; }
.card .body { padding: 22px 32px 28px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 6px; }
.field input { width: 100%; border: 1px solid #D1D5DB; border-radius: 6px; padding: 10px 14px; font-size: 14px; font-family: inherit; }
.field input:focus { outline: none; border-color: #1F4E79; box-shadow: 0 0 0 3px rgba(31,78,121,0.1); }
.btn { width: 100%; background: #1F4E79; color: #fff; border: 0; border-radius: 6px; padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn:hover { background: #163A5C; }
.btn:disabled { background: #9CA3AF; cursor: wait; }
.message { padding: 12px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
.message.ok { background: #D1FAE5; color: #065F46; }
.message.err { background: #FEE2E2; color: #991B1B; }
.footer { padding: 14px 32px; background: #F9FAFB; border-top: 1px solid #E5E7EB; font-size: 11px; color: #9CA3AF; text-align: center; }
.success-state { padding: 24px; text-align: center; }
.success-state .ic { font-size: 48px; margin-bottom: 12px; }
.success-state h2 { margin: 0 0 6px; font-size: 18px; color: #0A1628; }
.success-state p { margin: 0; font-size: 13px; color: #6B7280; }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="accelerate-mark">Accelerate Robotics</div>
    <h1 id="title">Sign in to your portal</h1>
    <p class="sub" id="subtitle">Enter your email to receive a sign-in link.</p>
  </div>
  <div class="body" id="body">
    <div id="error-message"></div>
    <form id="form">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" autocomplete="email" required placeholder="you@company.com">
      </div>
      <button class="btn" type="submit" id="submit-btn">Send sign-in link</button>
    </form>
  </div>
  <div class="footer">No password required · Powered by Accelerate Robotics</div>
</div>

<script>
'use strict';

const slug = location.pathname.match(/\/portal\/([^\/]+)/)?.[1];
const errorParam = new URLSearchParams(location.search).get('error');

if (errorParam) {
  const messages = {
    invalid_or_expired: 'That sign-in link is invalid or has expired. Request a new one below.',
    missing_token: 'Sign-in link is missing its token. Try requesting a new link.',
    not_found: 'Portal not found.',
  };
  document.getElementById('error-message').innerHTML = `<div class="message err">${messages[errorParam] || 'There was a problem signing you in.'}</div>`;
}

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim().toLowerCase();
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Sending…';
  try {
    const res = await fetch(`/api/portal-public/${encodeURIComponent(slug)}/sign-in`, {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    if (!res.ok) {
      const text = await res.text();
      let msg; try { msg = JSON.parse(text).error; } catch (_) { msg = text; }
      throw new Error(msg || 'Something went wrong');
    }
    document.getElementById('body').innerHTML = `
      <div class="success-state">
        <div class="ic">📬</div>
        <h2>Check your email</h2>
        <p>If that email is invited to this portal, you'll receive a sign-in link in the next minute or so. The link expires in 15 minutes.</p>
      </div>
    `;
    document.getElementById('title').textContent = 'Sign-in link sent';
    document.getElementById('subtitle').textContent = '';
  } catch (err) {
    document.getElementById('error-message').innerHTML = `<div class="message err">${err.message}</div>`;
    btn.disabled = false;
    btn.textContent = 'Send sign-in link';
  }
});
</script>

</body>
</html>
