<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Accelerate Robotics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/brand.css">
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    h1, h2, .headline { font-family: 'Space Grotesk', 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-[#f7f8fc] min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4"
           style="background:linear-gradient(135deg, var(--blue), var(--cyan));box-shadow:0 4px 14px rgba(0,85,255,0.25);">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M13 3L4 14h7l-1 7 9-11h-7l1-7z" fill="white" stroke="white" stroke-width="1.5"/></svg>
      </div>
      <h1 class="text-2xl font-bold headline">Admin Login</h1>
      <p class="text-gray-400 text-sm mt-1">Accelerate Robotics Dashboard</p>
    </div>

    <form id="loginForm" class="bg-white rounded-2xl shadow-lg p-8 space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" name="email" required autocomplete="email"
               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required autocomplete="current-password"
               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
      </div>
      <button type="submit"
              class="brand-btn-primary w-full py-3 font-semibold rounded-xl transition"
              style="font-size:0.95rem;">
        Sign In
      </button>
      <p id="loginError" class="text-red-600 text-sm font-medium text-center hidden"></p>

      <div class="text-center pt-1">
        <button type="button" id="forgotPasswordBtn" class="text-sm text-blue-600 hover:underline transition bg-transparent border-0 cursor-pointer">
          Forgot your password?
        </button>
      </div>
    </form>

    <!-- Forgot Password form — hidden by default, shown when link is clicked -->
    <form id="forgotForm" class="bg-white rounded-2xl shadow-lg p-8 space-y-5 hidden">
      <div class="text-center mb-2">
        <h2 class="text-lg font-bold">Reset Password</h2>
        <p class="text-gray-400 text-sm mt-1">Enter your email and we'll send a reset link.</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" name="email" required autocomplete="email"
               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
      </div>
      <button type="submit"
              class="brand-btn-primary w-full py-3 font-semibold rounded-xl transition"
              style="font-size:0.95rem;">
        Send Reset Link
      </button>
      <p id="forgotMsg" class="text-sm font-medium text-center hidden"></p>
      <div class="text-center pt-1">
        <button type="button" id="backToLoginBtn" class="text-sm text-blue-600 hover:underline transition bg-transparent border-0 cursor-pointer">
          Back to login
        </button>
      </div>
    </form>

    <p class="text-center mt-6">
      <a href="/" class="text-sm text-gray-400 hover:text-blue-600 transition">&larr; Back to site</a>
    </p>
  </div>

  <script src="/js/admin-auth.js"></script>
  <script>
    // WHY: Read ?return= param so login redirects back to the page that sent the user here
    const returnUrl = new URLSearchParams(window.location.search).get('return') || '/admin';
    // WHY: Only allow relative paths to prevent open redirect attacks
    const safeReturn = returnUrl.startsWith('/') ? returnUrl : '/admin';

    // WHY: Redirect to dashboard if already logged in so admins don't see the login page unnecessarily
    checkAuth().then(user => { if (user) window.location.href = safeReturn; });

    // ── Forgot password toggle ─────────────────────────────────
    document.getElementById('forgotPasswordBtn').addEventListener('click', () => {
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('forgotForm').classList.remove('hidden');
    });
    document.getElementById('backToLoginBtn').addEventListener('click', () => {
      document.getElementById('forgotForm').classList.add('hidden');
      document.getElementById('loginForm').classList.remove('hidden');
    });

    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msgEl = document.getElementById('forgotMsg');
      msgEl.classList.add('hidden');

      const form = e.target;
      const btn = form.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: form.email.value }),
        });
        const data = await res.json();
        // WHY: Always show success — server returns ok:true even for unknown emails to prevent enumeration
        msgEl.textContent = 'If an account exists with that email, a reset link has been sent.';
        msgEl.className = 'text-green-600 text-sm font-medium text-center';
        msgEl.classList.remove('hidden');
      } catch {
        msgEl.textContent = 'Network error. Please try again.';
        msgEl.className = 'text-red-600 text-sm font-medium text-center';
        msgEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    });

    // ── Login form ────────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('loginError');
      errEl.classList.add('hidden');

      const form = e.target;
      const btn = form.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: form.email.value,
            password: form.password.value,
          }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = safeReturn;
        } else {
          errEl.textContent = data.error || 'Login failed';
          errEl.classList.remove('hidden');
        }
      } catch {
        errEl.textContent = 'Network error. Please try again.';
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
