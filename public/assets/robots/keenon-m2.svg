<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Keenon M2 Cleaning Robot — squat gray body, cute face, spinning brushes, orange accents -->
  <!-- Base -->
  <rect x="10" y="48" width="44" height="10" rx="5" fill="#374151"/>
  <!-- Spinning brush left -->
  <g transform="translate(12,56)">
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-2.8" y1="-2.8" x2="2.8" y2="2.8" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="2.8" y1="-2.8" x2="-2.8" y2="2.8" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="2" fill="#ea580c"/>
  </g>
  <!-- Spinning brush right -->
  <g transform="translate(52,56)">
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-2.8" y1="-2.8" x2="2.8" y2="2.8" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="2.8" y1="-2.8" x2="-2.8" y2="2.8" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="2" fill="#ea580c"/>
  </g>
  <!-- Orange accent strip -->
  <rect x="12" y="52" width="40" height="1.5" rx="0.5" fill="#f97316" opacity="0.7"/>
  <!-- Body -->
  <path d="M14,48 L14,24 Q14,14 22,10 L42,10 Q50,14 50,24 L50,48 Z" fill="#9ca3af"/>
  <path d="M14,48 L14,24 Q14,14 22,10 L42,10 Q50,14 50,24 L50,48 Z" fill="url(#m2body)" stroke="#6b7280" stroke-width="0.5"/>
  <!-- Face screen -->
  <rect x="18" y="18" width="28" height="18" rx="9" fill="#1e293b"/>
  <!-- Left eye — big blue teardrop/wink shape -->
  <ellipse cx="27" cy="27" rx="5" ry="6" fill="#22d3ee" opacity="0.9"/>
  <ellipse cx="27" cy="25" rx="3" ry="3.5" fill="#67e8f9" opacity="0.6"/>
  <!-- Right eye — arrow/chevron shape -->
  <path d="M37,22 L43,27 L37,32 Z" fill="#22d3ee" opacity="0.9"/>
  <path d="M38,24 L42,27 L38,30 Z" fill="#67e8f9" opacity="0.5"/>
  <!-- Sensor on top -->
  <circle cx="42" cy="12" r="2.5" fill="#1e293b"/>
  <circle cx="42" cy="12" r="1.5" fill="#ef4444" opacity="0.7"/>
  <!-- Blue accent circle on right -->
  <circle cx="50" cy="22" r="3" fill="#3b82f6" opacity="0.5"/>
  <circle cx="50" cy="22" r="1.8" fill="#60a5fa" opacity="0.7"/>
  <!-- Keenon logo dot -->
  <circle cx="20" cy="42" r="2" fill="#3b82f6" opacity="0.5"/>
  <defs>
    <linearGradient id="m2body" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#9ca3af"/><stop offset="40%" stop-color="#d1d5db"/><stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
  </defs>
</svg>
