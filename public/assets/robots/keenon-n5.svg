<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Keenon N5 Cleaning Robot — white dog-like shape, cute face, ear nubs, spinning brushes -->
  <!-- Base -->
  <rect x="14" y="50" width="36" height="8" rx="4" fill="#e2e8f0"/>
  <rect x="14" y="50" width="36" height="8" rx="4" stroke="#cbd5e1" stroke-width="0.5" fill="url(#n5base)"/>
  <!-- Spinning brush left -->
  <g transform="translate(16,58)">
    <line x1="-3.5" y1="0" x2="3.5" y2="0" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-2.5" y1="-2.5" x2="2.5" y2="2.5" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="-3.5" x2="0" y2="3.5" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="2.5" y1="-2.5" x2="-2.5" y2="2.5" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="1.5" fill="#64748b"/>
  </g>
  <!-- Spinning brush right -->
  <g transform="translate(48,58)">
    <line x1="-3.5" y1="0" x2="3.5" y2="0" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-2.5" y1="-2.5" x2="2.5" y2="2.5" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="-3.5" x2="0" y2="3.5" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="2.5" y1="-2.5" x2="-2.5" y2="2.5" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="1.5" fill="#64748b"/>
  </g>
  <!-- Body — rounded dog-like shape -->
  <path d="M18,50 L18,28 Q18,14 32,10 Q46,14 46,28 L46,50 Z" fill="#f1f5f9"/>
  <path d="M18,50 L18,28 Q18,14 32,10 Q46,14 46,28 L46,50 Z" fill="url(#n5body)" stroke="#e2e8f0" stroke-width="0.5"/>
  <!-- Neck taper — gives the dog/penguin silhouette -->
  <path d="M24,18 Q32,8 40,18" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.3"/>
  <!-- Left ear nub -->
  <ellipse cx="24" cy="12" rx="3" ry="5" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5" transform="rotate(-15,24,12)"/>
  <!-- Right ear nub -->
  <ellipse cx="40" cy="12" rx="3" ry="5" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5" transform="rotate(15,40,12)"/>
  <!-- Sensor on top of head -->
  <circle cx="32" cy="8" r="2" fill="#ef4444" opacity="0.5"/>
  <circle cx="32" cy="8" r="1" fill="#ef4444" opacity="0.8"/>
  <!-- Face screen -->
  <rect x="22" y="22" width="20" height="14" rx="7" fill="#1e293b"/>
  <!-- Left eye — rounded square -->
  <rect x="25" y="25" width="6" height="7" rx="2" fill="#22d3ee" opacity="0.9"/>
  <rect x="26" y="26" width="3" height="4" rx="1" fill="#67e8f9" opacity="0.6"/>
  <!-- Right eye — rounded square -->
  <rect x="33" y="25" width="6" height="7" rx="2" fill="#22d3ee" opacity="0.9"/>
  <rect x="34" y="26" width="3" height="4" rx="1" fill="#67e8f9" opacity="0.6"/>
  <!-- Blue accent circle on right side -->
  <circle cx="46" cy="24" r="3" fill="#22d3ee" opacity="0.3"/>
  <circle cx="46" cy="24" r="1.8" fill="#22d3ee" opacity="0.6"/>
  <!-- Keenon logo dot -->
  <circle cx="24" cy="42" r="2" fill="#3b82f6" opacity="0.4"/>
  <defs>
    <linearGradient id="n5body" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#f1f5f9"/><stop offset="40%" stop-color="#ffffff"/><stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="n5base" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e2e8f0"/><stop offset="50%" stop-color="#f1f5f9"/><stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
</svg>
