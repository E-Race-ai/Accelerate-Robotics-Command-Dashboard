<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Keenon W3 Delivery Robot — tall silver body, enclosed compartments, handle -->
  <!-- Base/wheels -->
  <rect x="16" y="56" width="32" height="6" rx="3" fill="#374151"/>
  <circle cx="20" cy="62" r="1.5" fill="#1e293b"/>
  <circle cx="44" cy="62" r="1.5" fill="#1e293b"/>
  <!-- Blue LED strip on base -->
  <rect x="18" y="55" width="28" height="1.5" rx="0.75" fill="#3b82f6" opacity="0.8"/>
  <!-- Lower body -->
  <rect x="18" y="38" width="28" height="18" rx="4" fill="#c0c8d4"/>
  <rect x="18" y="38" width="28" height="18" rx="4" fill="url(#w3body)" stroke="#a0aab6" stroke-width="0.5"/>
  <!-- Upper body -->
  <rect x="19" y="16" width="26" height="23" rx="4" fill="#d0d8e0"/>
  <rect x="19" y="16" width="26" height="23" rx="4" fill="url(#w3upper)" stroke="#b0b8c4" stroke-width="0.5"/>
  <!-- Dark band between upper and lower -->
  <rect x="18" y="36" width="28" height="3" rx="1" fill="#334155"/>
  <!-- Top screen/lid -->
  <path d="M22,16 Q22,10 27,8 L37,8 Q42,10 42,16 Z" fill="#1e293b"/>
  <rect x="28" y="10" width="3" height="2" rx="0.5" fill="#94a3b8" opacity="0.6"/>
  <rect x="33" y="10" width="3" height="2" rx="0.5" fill="#94a3b8" opacity="0.6"/>
  <!-- Handle on right side -->
  <path d="M44,18 Q50,18 50,24 L50,34 Q50,38 46,38" fill="none" stroke="#d0d8e0" stroke-width="3" stroke-linecap="round"/>
  <path d="M44,18 Q50,18 50,24 L50,34 Q50,38 46,38" fill="none" stroke="#e0e8f0" stroke-width="2" stroke-linecap="round"/>
  <!-- Keenon logo area -->
  <circle cx="46" cy="44" r="2" fill="#3b82f6" opacity="0.6"/>
  <!-- Sensor dots on lower front -->
  <circle cx="24" cy="50" r="1" fill="#475569"/>
  <circle cx="28" cy="50" r="1" fill="#475569"/>
  <!-- Blue LED accent bottom -->
  <circle cx="22" cy="58" r="1" fill="#60a5fa" opacity="0.7"/>
  <circle cx="42" cy="58" r="1" fill="#60a5fa" opacity="0.7"/>
  <defs>
    <linearGradient id="w3body" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#c8d0dc"/><stop offset="50%" stop-color="#e0e8f0"/><stop offset="100%" stop-color="#b8c0cc"/>
    </linearGradient>
    <linearGradient id="w3upper" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#d8e0e8"/><stop offset="50%" stop-color="#eef2f6"/><stop offset="100%" stop-color="#c8d0dc"/>
    </linearGradient>
  </defs>
</svg>
