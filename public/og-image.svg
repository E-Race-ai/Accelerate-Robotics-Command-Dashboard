  <text x="300" y="515" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="900" fill="#38bdf8">$10T+</text>
  <line x1="410" y1="485" x2="410" y2="535" stroke="white" stroke-width="1" opacity="0.1"/>
  <text x="450" y="515" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#64748b">VENDORS</text>
  <text x="570" y="515" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="900" fill="#38bdf8">20+</text>
  <line x1="640" y1="485" x2="640" y2="535" stroke="white" stroke-width="1" opacity="0.1"/>
  <text x="680" y="515" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#64748b">CATEGORIES</text>
  <text x="830" y="515" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="900" fill="#38bdf8">5 Phases</text>
