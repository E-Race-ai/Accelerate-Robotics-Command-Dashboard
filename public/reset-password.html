<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Accelerate Robotics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/brand.css">
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    h1, h2, .headline { font-family: 'Space Grotesk', 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-[#f7f8fc] min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4"
           style="background:linear-gradient(135deg, var(--blue), var(--cyan));box-shadow:0 4px 14px rgba(0,85,255,0.25);">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M13 3L4 14h7l-1 7 9-11h-7l1-7z" fill="white" stroke="white" stroke-width="1.5"/></svg>
      </div>
      <h1 class="text-2xl font-bold headline">Reset Password</h1>
      <p class="text-gray-400 text-sm mt-1" id="subtitle">Validating link…</p>
    </div>

    <!-- Validating state -->
    <div id="loadingState" class="bg-white rounded-2xl shadow-lg p-8 text-center">
      <p class="text-sm text-gray-500">Checking your reset link…</p>
    </div>

    <!-- Expired / invalid state -->
    <div id="expiredState" class="bg-white rounded-2xl shadow-lg p-8 text-center hidden">
      <div class="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-4">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <h2 class="text-lg font-semibold text-gray-900 mb-2">Link can't be used</h2>
      <p class="text-sm text-gray-500 mb-5" id="expiredMsg">This reset link isn't valid. It may have expired or already been used.</p>
      <a href="/forgot-password" class="text-sm text-blue-600 hover:underline font-medium">Request a new link</a>
    </div>

    <!-- Reset form -->
    <form id="resetForm" class="bg-white rounded-2xl shadow-lg p-8 space-y-5 hidden">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" id="emailDisplay" disabled
               class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-500 outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
        <input type="password" id="password" minlength="8" required autocomplete="new-password"
               placeholder="At least 8 characters"
               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
        <input type="password" id="confirmPassword" minlength="8" required autocomplete="new-password"
               placeholder="Re-type your new password"
               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
      </div>
      <button type="submit"
              class="brand-btn-primary w-full py-3 font-semibold rounded-xl transition"
              style="font-size:0.95rem;">
        Set New Password
      </button>
      <p id="resetError" class="text-red-600 text-sm font-medium text-center hidden"></p>
    </form>

    <!-- Success state -->
    <div id="successState" class="bg-white rounded-2xl shadow-lg p-8 text-center hidden">
      <div class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-4">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2 class="text-lg font-semibold text-gray-900 mb-2">Password updated</h2>
      <p class="text-sm text-gray-500 mb-5">You can now sign in with your new password.</p>
      <a href="/admin-login" class="brand-btn-primary inline-block px-6 py-2.5 rounded-xl text-sm font-semibold">Sign In</a>
    </div>
  </div>

  <script>
    const token = new URLSearchParams(window.location.search).get('token');

    async function init() {
      if (!token) return showExpired("No reset token in the URL. Request a new link.");
      try {
        const res = await fetch('/api/auth/validate-reset?token=' + encodeURIComponent(token));
        if (res.status === 410 || res.status === 404) {
          const d = await res.json();
          return showExpired(d.error);
        }
        if (!res.ok) return showExpired("Invalid reset link.");
        const data = await res.json();
        document.getElementById('emailDisplay').value = data.email;
        document.getElementById('subtitle').textContent = 'Choose a new password below';
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('resetForm').classList.remove('hidden');
      } catch {
        showExpired("Network error. Try again or request a new link.");
      }
    }

    function showExpired(msg) {
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('subtitle').textContent = '';
      document.getElementById('expiredMsg').textContent = msg;
      document.getElementById('expiredState').classList.remove('hidden');
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('resetError');
      errEl.classList.add('hidden');

      const pw = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      if (pw !== confirm) {
        errEl.textContent = "Passwords don't match.";
        errEl.classList.remove('hidden');
        return;
      }
      if (pw.length < 8) {
        errEl.textContent = 'Password must be at least 8 characters.';
        errEl.classList.remove('hidden');
        return;
      }

      const btn = e.target.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Saving…';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: pw }),
        });
        if (res.ok) {
          document.getElementById('resetForm').classList.add('hidden');
          document.getElementById('subtitle').textContent = '';
          document.getElementById('successState').classList.remove('hidden');
          return;
        }
        const data = await res.json();
        if (res.status === 410 || res.status === 404) {
          document.getElementById('resetForm').classList.add('hidden');
          showExpired(data.error);
          return;
        }
        errEl.textContent = data.error || 'Could not update password.';
        errEl.classList.remove('hidden');
      } catch {
        errEl.textContent = 'Network error. Please try again.';
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Set New Password';
      }
    });

    init();
  </script>
</body>
</html>
